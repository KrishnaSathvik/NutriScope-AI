<!DOCTYPE html>

<html class="light" lang="en"><head>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nutriscope AI - Profile Basics</title>

                        "surface-variant": "#e5e2e1",

                        "surface": "#fcf9f8",
                        "secondary-fixed": "#dfe0ff",
                        "tertiary": "#006e1d",

                        "primary-fixed-dim": "#ffb59c",
                        "inverse-surface": "#313030",
                        "primary-fixed": "#ffdbcf",

                        "on-primary-container": "#561700",
                        "surface-container-lowest": "#ffffff",

                        "primary-container": "#f26b38",

                    }
                }
            }
        }

<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col pb-safe">
<!-- Top Navigation (Mobile / Top-level destination suppression bypass logic: This is an onboarding step, suppress standard nav, provide simplified back/header) -->
<header class="w-full top-0 sticky bg-background flex items-center justify-between px-margin-mobile py-base w-full z-50">
<button aria-label="Back" class="text-primary hover:opacity-80 transition-opacity p-2 -ml-2 rounded-full active:scale-95 duration-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="font-display-lg-mobile text-display-lg-mobile font-extrabold text-primary">Nutriscope AI</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-margin-mobile md:px-margin-desktop w-full max-w-3xl mx-auto py-md flex flex-col gap-lg">
<!-- Header Section -->
<section class="flex flex-col gap-sm">
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary">About you.</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Friendly info — not a medical form.</p>
</section>
<!-- Form Section (Bento-style layout for inputs) -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Basic Info Card -->
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl p-md flex flex-col gap-md shadow-sm">
<!-- Name Input -->
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-secondary" for="name">Name (Optional)</label>
<input class="w-full bg-transparent border border-surface-variant rounded-lg p-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline" id="name" placeholder="What should we call you?" type="text"/>
</div>
<!-- Age & Gender Row -->
<div class="grid grid-cols-2 gap-md">
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-secondary" for="age">Age</label>
<input class="w-full bg-transparent border border-surface-variant rounded-lg p-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline text-center" id="age" placeholder="Years" type="number"/>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-secondary" for="gender">Sex</label>
<div class="relative">
<select class="w-full bg-transparent border border-surface-variant rounded-lg p-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all appearance-none pr-10" id="gender">
<option disabled="" selected="" value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Metrics Card -->
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl p-md flex flex-col gap-md shadow-sm">
<!-- Height & Weight Row -->
<div class="grid grid-cols-2 gap-md">
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-secondary" for="height">Height</label>
<div class="relative">
<input class="w-full bg-transparent border border-surface-variant rounded-lg p-sm pr-12 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline text-right" id="height" placeholder="0" type="number"/>
<span class="absolute right-sm top-1/2 -translate-y-1/2 font-caption text-caption text-outline pointer-events-none">cm</span>
</div>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-bold text-label-bold text-secondary" for="weight">Weight</label>
<div class="relative">
<input class="w-full bg-transparent border border-surface-variant rounded-lg p-sm pr-12 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline text-right" id="weight" placeholder="0" type="number"/>
<span class="absolute right-sm top-1/2 -translate-y-1/2 font-caption text-caption text-outline pointer-events-none">kg</span>
</div>
</div>
</div>
<!-- Activity Level Selector -->
<div class="flex flex-col gap-base pt-sm border-t border-surface-variant mt-sm">
<label class="font-label-bold text-label-bold text-secondary">Activity Level</label>
<div class="grid grid-cols-3 gap-sm bg-surface-container-low p-1 rounded-lg">
<label class="cursor-pointer">
<input class="peer sr-only" name="activity" type="radio" value="light"/>
<div class="text-center py-2 rounded-md font-caption text-caption text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-on-primary-container transition-colors">
                                Light
                            </div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="activity" type="radio" value="active"/>
<div class="text-center py-2 rounded-md font-caption text-caption text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-on-primary-container transition-colors">
                                Active
                            </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="activity" type="radio" value="intense"/>
<div class="text-center py-2 rounded-md font-caption text-caption text-on-surface-variant peer-checked:bg-primary-container peer-checked:text-on-primary-container transition-colors">
                                Intense
                            </div>
</label>
</div>
</div>
</div>
</section>
<!-- Live Calculation Preview Card (Nutriscope AI Insight Box style) -->
<section class="mt-auto pt-lg">
<div class="relative p-[2px] rounded-xl bg-gradient-to-r from-tertiary-fixed to-tertiary-fixed-dim">
<div class="bg-surface-container-lowest rounded-xl p-md flex items-center justify-between shadow-sm">
<div class="flex flex-col gap-xs">
<div class="flex items-center gap-xs text-tertiary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-label-bold text-label-bold">Live Target Preview</span>
</div>
<p class="font-caption text-caption text-on-surface-variant">Estimated daily energy expenditure</p>
</div>
<div class="text-right">
<div class="font-headline-md text-headline-md text-primary" id="tdee-display">2,150</div>
<div class="font-caption text-caption text-secondary">kcal / day</div>
</div>
</div>
</div>
</section>
<!-- CTA Section -->
<section class="pt-sm pb-lg">
<button class="w-full bg-primary text-on-primary rounded-xl py-md font-label-bold text-label-bold flex items-center justify-center gap-sm hover:opacity-90 hover:saturate-150 transition-all active:scale-[0.98]">
<span>Continue</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</section>
</main>
<script>
        // Simple logic to simulate live recalculation based on inputs
        const inputs = ['age', 'gender', 'height', 'weight'];
        const activityRadios = document.querySelectorAll('input[name="activity"]');
        const tdeeDisplay = document.getElementById('tdee-display');

        function recalculate() {
            // Very rudimentary mock calculation for visual feedback
            const weight = parseFloat(document.getElementById('weight').value) || 70;
            const height = parseFloat(document.getElementById('height').value) || 170;
            const age = parseFloat(document.getElementById('age').value) || 30;
            
            let base = (10 * weight) + (6.25 * height) - (5 * age) + 5; // Simplified Mifflin-St Jeor
            
            let multiplier = 1.375; // Active
            const selectedActivity = document.querySelector('input[name="activity"]:checked').value;
            if (selectedActivity === 'light') multiplier = 1.2;
            if (selectedActivity === 'intense') multiplier = 1.55;

            const tdee = Math.round(base * multiplier);
            
            // Add a slight delay and animation class for 'calculation' effect
            tdeeDisplay.classList.add('opacity-50', 'scale-95');
            setTimeout(() => {
                tdeeDisplay.innerText = tdee.toLocaleString();
                tdeeDisplay.classList.remove('opacity-50', 'scale-95');
            }, 150);
        }

        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', recalculate);
        });

        activityRadios.forEach(radio => {
            radio.addEventListener('change', recalculate);
        });
    </script>
</body></html>
