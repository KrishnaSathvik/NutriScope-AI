<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .coach-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(242,107,56,0.2);
        }

            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;

            transform: translateY(20px);
        }

            to {
                opacity: 1;

            }

<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-lg">
<!-- TopAppBar (Transactional - Hidden Nav Shell Logic Applied) -->
<header class="w-full top-0 bg-background dark:bg-background flat no shadows flex items-center justify-between px-margin-main h-16 shrink-0 z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:opacity-80 scale-95 transition-transform text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-coach-orange flex-1 text-center pr-10">
            Nutriscope AI
        </div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-main flex flex-col justify-center pb-8 pt-4 max-w-md mx-auto w-full">
<!-- Headers -->
<div class="mb-8 animate-fade-up">
<h1 class="font-headline-xl text-headline-xl text-on-background mb-2">Join the Movement</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Start tracking your protein-first progress today.</p>
</div>
<!-- Form Elements -->
<form class="flex flex-col gap-stack-md mb-8 w-full animate-fade-up delay-100">
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider ml-1" for="name">Full Name</label>
<input class="coach-input w-full bg-surface-container-low border-0 rounded-xl px-4 py-4 font-body-lg text-body-lg text-on-surface placeholder-tertiary-container transition-shadow" id="name" placeholder="Alex Carter" type="text"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider ml-1" for="email">Email Address</label>
<input class="coach-input w-full bg-surface-container-low border-0 rounded-xl px-4 py-4 font-body-lg text-body-lg text-on-surface placeholder-tertiary-container transition-shadow" id="email" placeholder="alex@example.com" type="email"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider ml-1" for="password">Password</label>
<input class="coach-input w-full bg-surface-container-low border-0 rounded-xl px-4 py-4 font-body-lg text-body-lg text-on-surface placeholder-tertiary-container transition-shadow" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-coach-orange text-paper-white rounded-xl py-4 mt-4 font-title-md text-title-md shadow-[0_8px_20px_rgba(242,107,56,0.25)] hover:bg-primary transition-colors active:scale-95 transform duration-150 flex items-center justify-center gap-2" type="button">
                Create Account
                <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
</button>
</form>
<!-- Social Sign Up Divider -->
<div class="flex items-center gap-4 mb-8 animate-fade-up delay-200">
<div class="flex-1 h-px bg-surface-variant"></div>
<span class="font-label-caps text-label-caps text-tertiary-container uppercase">Or continue with</span>
<div class="flex-1 h-px bg-surface-variant"></div>
</div>
<!-- Social Buttons -->
<div class="flex flex-col gap-stack-sm mb-8 animate-fade-up delay-300">
<button class="w-full bg-paper-white border border-surface-variant text-on-surface rounded-xl py-3 font-title-md text-title-md shadow-sm hover:bg-surface-container-lowest transition-colors flex items-center justify-center gap-3">

</svg>

<path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.12 3.792 3.059 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.647-.026 2.665-1.48 3.666-2.947 1.162-1.704 1.646-3.355 1.666-3.447-.033-.013-3.235-1.242-3.268-4.961-.026-3.114 2.535-4.595 2.653-4.667-1.454-2.128-3.692-2.42-4.483-2.484-1.921-.194-3.868 1.11-4.85 1.11zm1.758-2.632c.983-1.183 1.646-2.83 1.464-4.464-1.411.059-3.125.94-4.135 2.115-.901 1.04-1.685 2.714-1.477 4.305 1.58.118 3.164-.783 4.148-1.956z" fill="currentColor"></path>
</svg>

            </button>

<div class="text-center mt-auto animate-fade-up delay-300">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Already have an account? 
                <a class="text-coach-orange font-semibold hover:underline" href="#">Log In</a>
</p>

</main>
<script>
        // Simple micro-interaction for input fields to feel more native
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
                input.parentElement.style.transition = 'transform 0.2s cubic-bezier(0.16, 1, 0.3, 1)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
