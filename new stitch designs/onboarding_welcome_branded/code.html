<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #fcf9f8;
            color: #1c1b1b;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Kinetic Orange Primary Button */
        .btn-primary {
            background-color: #a93702;
            color: #ffffff;
            border-radius: 9999px; /* highly rounded */
            padding: 16px 32px;
            font-family: 'Hanken Grotesk';
            font-size: 18px;
            font-weight: 700;
            line-height: 28px;
            transition: all 0.2s ease;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary:hover {
            filter: saturate(1.2) brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(169, 55, 2, 0.2);
        }

        /* Secondary Outline Button */
        .btn-secondary {
            background-color: transparent;
            color: #1c1b1b;
            border: 2px solid #545a94; /* Midnight Blue */
            border-radius: 9999px;
            padding: 14px 30px; /* adjusted for border */
            font-family: 'Hanken Grotesk';
            font-size: 18px;
            font-weight: 700;
            line-height: 28px;
            transition: all 0.2s ease;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-secondary:hover {
            background-color: #f0eded;
        }

        /* Ambient Hover Shadow */
        .ambient-hover:hover {
            box-shadow: 0 20px 40px -10px rgba(169, 55, 2, 0.15);
        }
        
        /* Smooth fade-in for page load */
        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
