<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Profile Details - ProteinPlate AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#380c00",
                        "on-secondary-fixed-variant": "#3c427a",
                        "on-tertiary-fixed": "#002204",
                        "background": "#fdf8f8",
                        "secondary-container": "#b7bcfd",
                        "primary-container": "#a93702",
                        "glass-bg": "rgba(255, 255, 255, 0.7)",
                        "primary-fixed-dim": "#ffb59c",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#313030",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#a93702",
                        "secondary": "#545a94",
                        "glass-border": "rgba(255, 255, 255, 0.9)",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e6e1e1",
                        "surface-variant": "#e6e1e1",
                        "primary": "#812700",
                        "on-surface-variant": "#58423a",
                        "on-primary-container": "#ffcdbd",
                        "inverse-on-surface": "#f4f0ef",
                        "surface-container-high": "#ece7e7",
                        "tertiary-container": "#006e1d",
                        "surface-dim": "#ddd9d8",
                        "on-surface": "#1c1b1b",
                        "tertiary-fixed": "#99f895",
                        "on-secondary-container": "#444a83",
                        "surface": "#fcf9f8",
                        "secondary-fixed-dim": "#bdc2ff",
                        "on-tertiary-container": "#8fee8c",
                        "tertiary-fixed-dim": "#7edb7c",
                        "surface-container": "#f1edec",
                        "on-secondary-fixed": "#0e144d",
                        "on-primary-fixed-variant": "#822800",
                        "gauge-track": "#eae7e7",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#dfe0ff",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f7f2f2",
                        "surface-bright": "#fdf8f8",
                        "on-tertiary-fixed-variant": "#005314",
                        "on-background": "#1c1b1b",
                        "outline": "#8c7168",
                        "outline-variant": "#e0c0b5",
                        "inverse-primary": "#ffb59c",
                        "primary-fixed": "#ffdbcf",
                        "tertiary": "#005314"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "md": "24px",
                        "xl": "80px",
                        "margin-mobile": "16px",
                        "lg": "48px",
                        "gutter": "24px",
                        "margin-desktop": "40px",
                        "sm": "12px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "body-md": ["Hanken Grotesk"],
                        "caption": ["Hanken Grotesk"],
                        "display-lg-mobile": ["Hanken Grotesk"],
                        "label-bold": ["Hanken Grotesk"],
                        "label-caps": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "display-lg-mobile": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-bold": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "label-caps": ["10px", { "lineHeight": "12px", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.background');
            background-image: radial-gradient(circle at 50% 0%, rgba(169, 55, 2, 0.05) 0%, transparent 70%),
                              radial-gradient(circle at 100% 100%, rgba(183, 188, 253, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Hide scrollbar for clean native feel */
        ::-webkit-scrollbar {
            display: none;
        }
        
        /* Native iOS style input transitions */
        .ios-input-group {
            position: relative;
        }
        .ios-input-group input:focus + .ios-input-label,
        .ios-input-group input:not(:placeholder-shown) + .ios-input-label {
            transform: translateY(-12px) scale(0.85);
            color: theme('colors.primary');
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-body-md text-on-background pb-8 md:hidden">
<!-- Progress Bar & Back Button -->
<div class="px-margin-mobile pt-12 pb-4 flex items-center justify-between sticky top-0 bg-background/80 backdrop-blur-md z-10">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface" style="font-variation-settings: 'FILL' 0;">arrow_back_ios_new</span>
</button>
<div class="flex-1 px-4">
<div class="h-1 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full w-2/5 transition-all duration-500 ease-in-out"></div>
</div>
</div>
<button class="font-label-bold text-label-bold text-primary hover:opacity-80 transition-opacity">Skip</button>
</div>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-margin-mobile pt-4 pb-24">
<!-- Header -->
<div class="mb-10 animate-fade-in-up">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-background mb-2">Tell us about you</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">This helps us calculate your optimal daily macro targets.</p>
</div>
<!-- Form Fields -->
<form class="space-y-6 flex-1 flex flex-col">
<!-- Gender Segmented Control -->
<div class="bg-surface-container-highest p-1 rounded-DEFAULT flex w-full relative mb-4">
<!-- Active Indicator (Background) -->
<div class="absolute h-[calc(100%-8px)] top-1 bg-surface rounded-[12px] shadow-sm transition-transform duration-300 ease-out w-[calc(50%-4px)] translate-x-0" id="gender-indicator"></div>
<label class="flex-1 text-center relative z-10 cursor-pointer group">
<input checked="" class="peer sr-only" name="gender" onchange="updateGenderIndicator(0)" type="radio" value="female">
<div class="py-3 font-label-bold text-label-bold text-on-surface transition-colors">Female</div>
</label>
<label class="flex-1 text-center relative z-10 cursor-pointer group">
<input class="peer sr-only" name="gender" onchange="updateGenderIndicator(1)" type="radio" value="male">
<div class="py-3 font-label-bold text-label-bold text-on-surface transition-colors peer-checked:text-on-surface">Male</div>
</label>
</div>
<!-- Age Input -->
<div class="bg-surface border border-outline-variant/30 rounded-DEFAULT p-4 shadow-sm focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all group">
<label class="block font-caption text-caption text-on-surface-variant mb-1 group-focus-within:text-primary transition-colors">Age</label>
<div class="flex items-center">
<input class="w-full bg-transparent font-headline-md text-headline-md text-on-surface placeholder-on-surface-variant/40 outline-none border-none p-0 focus:ring-0" inputmode="numeric" pattern="[0-9]*" placeholder="e.g. 28" type="number">
<span class="font-body-md text-body-md text-on-surface-variant ml-2">years</span>
</div>
</div>
<div class="flex gap-4">
<!-- Height Input -->
<div class="flex-1 bg-surface border border-outline-variant/30 rounded-DEFAULT p-4 shadow-sm focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all group">
<label class="block font-caption text-caption text-on-surface-variant mb-1 group-focus-within:text-primary transition-colors">Height</label>
<div class="flex items-center">
<input class="w-full bg-transparent font-headline-md text-headline-md text-on-surface placeholder-on-surface-variant/40 outline-none border-none p-0 focus:ring-0" inputmode="decimal" placeholder="170" type="number">
<span class="font-body-md text-body-md text-on-surface-variant ml-2">cm</span>
</div>
</div>
<!-- Weight Input -->
<div class="flex-1 bg-surface border border-outline-variant/30 rounded-DEFAULT p-4 shadow-sm focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all group">
<label class="block font-caption text-caption text-on-surface-variant mb-1 group-focus-within:text-primary transition-colors">Weight</label>
<div class="flex items-center">
<input class="w-full bg-transparent font-headline-md text-headline-md text-on-surface placeholder-on-surface-variant/40 outline-none border-none p-0 focus:ring-0" inputmode="decimal" placeholder="65" type="number">
<span class="font-body-md text-body-md text-on-surface-variant ml-2">kg</span>
</div>
</div>
</div>
<!-- Activity Level Selection (Glassmorphism Card) -->
<div class="mt-6">
<label class="block font-label-bold text-label-bold text-on-surface mb-3">Activity Level</label>
<div class="space-y-3">
<label class="flex items-center p-4 bg-glass-bg border border-glass-border rounded-DEFAULT backdrop-blur-md shadow-sm cursor-pointer relative overflow-hidden group">
<input class="peer sr-only" name="activity" type="radio" value="light">
<div class="absolute inset-0 bg-primary/0 peer-checked:bg-primary/5 transition-colors"></div>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-primary rounded-DEFAULT transition-colors pointer-events-none"></div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center mr-4 group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant peer-checked:text-primary" style="font-variation-settings: 'FILL' 1;">directions_walk</span>
</div>
<div class="flex-1">
<div class="font-label-bold text-label-bold text-on-surface">Lightly Active</div>
<div class="font-caption text-caption text-on-surface-variant mt-0.5">Office job, light walks</div>
</div>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-all">
<span class="material-symbols-outlined text-[12px] text-on-primary opacity-0 peer-checked:opacity-100" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</label>
<label class="flex items-center p-4 bg-glass-bg border border-glass-border rounded-DEFAULT backdrop-blur-md shadow-sm cursor-pointer relative overflow-hidden group">
<input checked="" class="peer sr-only" name="activity" type="radio" value="moderate">
<div class="absolute inset-0 bg-primary/0 peer-checked:bg-primary/5 transition-colors"></div>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-primary rounded-DEFAULT transition-colors pointer-events-none"></div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center mr-4 group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant peer-checked:text-primary" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<div class="flex-1">
<div class="font-label-bold text-label-bold text-on-surface">Moderately Active</div>
<div class="font-caption text-caption text-on-surface-variant mt-0.5">Exercise 3-5 days/week</div>
</div>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-all">
<span class="material-symbols-outlined text-[12px] text-on-primary opacity-0 peer-checked:opacity-100" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</label>
</div>
</div>
</form>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile pb-8 bg-gradient-to-t from-background via-background/90 to-transparent pt-12">
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-4 rounded-full shadow-[0_8px_16px_rgba(169,55,2,0.2)] hover:bg-primary-fixed-variant transition-all active:scale-[0.98] flex items-center justify-center gap-2">
            Continue
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
<script>
        // Segmented Control Animation Logic
        function updateGenderIndicator(index) {
            const indicator = document.getElementById('gender-indicator');
            if (index === 0) {
                indicator.style.transform = 'translateX(0)';
            } else {
                // translate by 100% of its width plus the padding gap (which is negligible here)
                indicator.style.transform = 'translateX(100%)';
            }
        }
    </script>
</body></html>
