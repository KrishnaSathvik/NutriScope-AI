<script>
        // Simple Particle System for subtle reward effect
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#F26B38', '#FFD54F', '#2D6A4F', '#ffb59c'];
            const numParticles = 20;

            for (let i = 0; i < numParticles; i++) {
                createParticle();
            }

            function createParticle() {
                const particle = document.createElement('div');
                particle.classList.add('particle', 'rounded-full');
                
                // Randomize properties
                const size = Math.random() * 6 + 4;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                // Center origin slightly above middle
                const startX = window.innerWidth / 2;
                const startY = window.innerHeight / 2 - 100;
                
                // Destination spread
                const tx = (Math.random() - 0.5) * 200 + 'px';
                const ty = (Math.random() - 0.5) * 200 - 50 + 'px';
                const rot = Math.random() * 360 + 'deg';
                
                // Styling
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.backgroundColor = color;
                particle.style.left = `${startX}px`;
                particle.style.top = `${startY}px`;
                
                // CSS Variables for animation
                particle.style.setProperty('--tx', tx);
                particle.style.setProperty('--ty', ty);
                particle.style.setProperty('--rot', rot);
                
                // Delay for organic feel
                particle.style.animationDelay = `${Math.random() * 0.3}s`;
                
                container.appendChild(particle);
                
                // Cleanup
                setTimeout(() => {
                    particle.remove();
                }, 2500);
            }
        });
    </script>
