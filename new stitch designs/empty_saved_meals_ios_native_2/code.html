<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden flex-shrink-0">
<img alt="User profile" class="w-full h-full object-cover" data-alt="A small, soft-lit profile picture placeholder of a casual, friendly user in a modern, warm 'Coach-Style' UI context. Minimalist background, high clarity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBcRjzskM5imK1S0jXb2FoqlmvzK3RN5WxIvF4OZQv6-XQEw3d5ea1gmPeApd4T8afUCPxOKlwuOs2U-ibRibgynGDyVN0XJj8M_ws0OzhXbpnrbdwvGcL3_ol979x3KEWkE3ClD__FXd9WxeE-fOx4UBXimdN06a2gxmr33Njd7QBDf1swSJSz3V0pqWX2Pu17bpUpLZ3JhWzYbuBhKK7l9iWMSCOzXcbvlv50CGeB1chZRw6T7WKin4wcWALRBlDJ1GicMO6UDgSU"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-black text-coach-orange">Nutriscope AI</h1>
</div>
<button class="text-primary hover:opacity-80 transition-opacity flex items-center justify-center w-10 h-10 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-main text-center max-w-md mx-auto w-full">
<!-- Empty State Icon -->
<div class="mb-stack-lg w-24 h-24 rounded-full bg-surface-container-high flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined text-5xl opacity-80" style="font-variation-settings: 'FILL' 0, 'wght' 300;">restaurant</span>
</div>
<!-- Typography -->
<h2 class="text-[22px] font-semibold text-on-surface mb-2 tracking-tight">No Saved Meals</h2>
<p class="text-[15px] text-on-surface-variant mb-8 max-w-[280px] leading-relaxed">
            Scan or manually log a meal to save your favorites for quick tracking later.
        </p>
<!-- Primary Action -->
<button class="w-full bg-coach-orange text-paper-white h-[50px] rounded-[14px] text-[17px] font-semibold transition-all duration-200 active:scale-[0.98] mb-3 flex items-center justify-center">
            Log Your First Meal
        </button>
<!-- Secondary Action -->
<button class="w-full bg-transparent text-coach-orange h-[50px] rounded-[14px] text-[17px] font-medium transition-all duration-200 active:scale-[0.98] flex items-center justify-center">
            Browse Recipes
        </button>
</main>
<!-- Bottom Nav Bar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface-container-lowest shadow-[0_-4px_20px_rgba(242,107,56,0.1)] rounded-t-xl scale-110 duration-300 ease-out">
<!-- TODAY -->
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary transition-colors group flex-1" href="#">
<div class="w-16 h-8 flex items-center justify-center rounded-full mb-1 group-active:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">calendar_today</span>
</div>
<span class="font-label-caps text-label-caps uppercase">TODAY</span>
</a>
<!-- MEALS (Active) -->
<a class="flex flex-col items-center justify-center text-coach-orange hover:text-primary transition-colors group flex-1" href="#">
<div class="w-16 h-8 flex items-center justify-center rounded-full bg-coach-orange/10 mb-1 group-active:bg-coach-orange/20 transition-colors">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<span class="font-label-caps text-label-caps uppercase">MEALS</span>
</a>
<!-- SCAN -->
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary transition-colors group flex-1" href="#">
<div class="w-16 h-8 flex items-center justify-center rounded-full mb-1 group-active:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">center_focus_strong</span>
</div>
<span class="font-label-caps text-label-caps uppercase">SCAN</span>
</a>
<!-- COACH -->
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary transition-colors group flex-1" href="#">
<div class="w-16 h-8 flex items-center justify-center rounded-full mb-1 group-active:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">psychology</span>
</div>
<span class="font-label-caps text-label-caps uppercase">COACH</span>
</a>

<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:text-primary transition-colors group flex-1" href="#">
<div class="w-16 h-8 flex items-center justify-center rounded-full mb-1 group-active:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">person</span>
</div>
<span class="font-label-caps text-label-caps uppercase">PROFILE</span>
</a>
</nav>
