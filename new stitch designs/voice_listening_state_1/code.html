<style>
        /* Smooth base styles */
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Ambient Glow Shadow */
        .ambient-glow {
            box-shadow: 0 8px 32px rgba(242, 107, 56, 0.15);
        }

        /* Stronger glow for the active mic */
        .mic-glow {
            box-shadow: 0 0 40px rgba(242, 107, 56, 0.4);
        }

        /* Waveform Animation */
        @keyframes wave {
            0%, 100% { height: 12px; }
            50% { height: 48px; }
        }
        
        .wave-bar {
            width: 8px;
            background-color: theme('colors.coach-orange');
            border-radius: 9999px;
            animation: wave 1.2s ease-in-out infinite;
            transform-origin: center;
        }

        .wave-bar:nth-child(1) { animation-delay: 0.0s; height: 16px; }
        .wave-bar:nth-child(2) { animation-delay: 0.2s; height: 32px; }
        .wave-bar:nth-child(3) { animation-delay: 0.4s; height: 48px; }
        .wave-bar:nth-child(4) { animation-delay: 0.6s; height: 32px; }
        .wave-bar:nth-child(5) { animation-delay: 0.8s; height: 16px; }

        /* Pulse Ring Animation */
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .animate-pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        /* Typewriter effect simulation for text entering */
        @keyframes fade-in-text {
            from { opacity: 0.5; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing-text {
            animation: fade-in-text 0.4s ease-out forwards;
        }
    </style>
<style>

</button>

<!-- Main Content Area -->

<div class="wave-bar"></div>
<div class="wave-bar"></div>

<div class="relative w-32 h-32 flex items-center justify-center mb-12">
<!-- Ripple Effects -->
<div class="absolute inset-0 bg-coach-orange rounded-full animate-pulse-ring"></div>

<span class="inline-block w-2 h-5 bg-coach-orange ml-1 align-middle animate-pulse"></span>
