<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nutriscope AI - Voice Input</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
        /* SF Pro Display / Text Simulation */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Typewriter effect simulation for text entering */
        @keyframes fade-in-text {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing-text {
            animation: fade-in-text 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Subtle iOS Pulse */
        @keyframes ios-pulse {
            0% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.4); opacity: 0.05; }
            100% { transform: scale(1); opacity: 0.15; }
        }
        .animate-ios-pulse {
            animation: ios-pulse 2.5s ease-in-out infinite;
        }
        
        /* Glassmorphism backdrop */
        .ios-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-[#F2F2F7] text-black min-h-screen flex flex-col relative overflow-hidden">
<!-- Subtle Branding -->
<div class="absolute top-14 left-0 w-full text-center z-20">
<span class="text-[13px] font-semibold tracking-widest uppercase text-gray-400/80">
            Hey Alex
        </span>
</div>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-8 z-10 w-full max-w-md mx-auto pt-20 pb-32">
<!-- Transcription Area -->
<div class="w-full text-center mb-24 min-h-[120px] flex items-end justify-center">
<p class="text-[32px] leading-[1.2] font-light text-gray-900 tracking-tight typing-text">
                "Grilled chicken breast with half a cup of quinoa and some roasted asparagus..."<span class="inline-block w-[3px] h-8 bg-[#007AFF] ml-1 align-middle animate-pulse rounded-full"></span>
</p>
</div>
<!-- Dictation Mic Indicator -->
<div class="relative w-24 h-24 flex items-center justify-center mt-8">
<!-- Pulsing Rings -->
<div class="absolute inset-0 bg-[#007AFF] rounded-full animate-ios-pulse"></div>
<div class="absolute inset-0 bg-[#007AFF] rounded-full animate-ios-pulse" style="animation-delay: 1.25s;"></div>
<!-- Mic Core -->
<div class="relative w-16 h-16 bg-[#007AFF] rounded-full flex items-center justify-center text-white shadow-[0_8px_24px_rgba(0,122,255,0.4)] transform scale-100 hover:scale-105 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1, 'wght' 400;">mic</span>
</div>
</div>
</main>
<!-- Bottom Actions (iOS Native Style) -->
<div class="absolute bottom-0 w-full ios-glass pb-10 pt-4 px-6 border-t border-gray-200/50 z-20">
<div class="max-w-md mx-auto flex justify-between items-center">
<button class="text-[#007AFF] text-[17px] font-normal tracking-tight px-4 py-2 hover:opacity-70 active:opacity-50 transition-opacity">
                Cancel
            </button>
<button class="text-[#007AFF] text-[17px] font-semibold tracking-tight px-4 py-2 hover:opacity-70 active:opacity-50 transition-opacity">
                Done
            </button>
</div>
</div>
</body></html>
