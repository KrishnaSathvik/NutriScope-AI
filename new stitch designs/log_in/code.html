<style>
        /* Custom styles for subtle animations and interactions */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg overflow-x-hidden">
<!-- TopAppBar (Transactional - simplified) -->
<header class="bg-background w-full top-0 flex items-center justify-between px-margin-main h-16 shrink-0 z-50">
<button aria-label="Go back" class="text-primary hover:opacity-80 scale-95 transition-transform flex items-center justify-center w-10 h-10 rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-coach-orange flex-1 text-center pr-10">
<!-- Offset pr-10 balances the back button for true centering -->
            ProteinPlate AI
        </div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto px-margin-main flex flex-col pt-stack-lg pb-safe">
<!-- Header Section -->
<div class="mb-stack-lg space-y-stack-sm text-center pt-8">
<h1 class="font-headline-xl text-headline-xl text-on-surface">Welcome Back</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Sign in to continue tracking your meals.</p>
</div>
<!-- Login Form Container (Bento/Glass vibe) -->
<div class="bg-surface-container-lowest rounded-2xl p-6 shadow-[0_8px_30px_rgba(242,107,56,0.08)] relative z-10 flex-1">
<form class="space-y-stack-md flex flex-col h-full">
<!-- Email Input -->
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative input-glow rounded-xl transition-shadow duration-200">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 0;">mail</span>
</div>
<input class="w-full bg-surface-container-low text-on-surface border-none rounded-xl pl-12 pr-4 py-4 font-body-lg focus:ring-0 focus:bg-surface-container-lowest transition-colors" id="email" name="email" placeholder="you@example.com" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div class="space-y-1">
<div class="flex justify-between items-baseline ml-1 mr-1">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<div class="relative input-glow rounded-xl transition-shadow duration-200">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 0;">lock</span>
</div>
<input class="w-full bg-surface-container-low text-on-surface border-none rounded-xl pl-12 pr-12 py-4 font-body-lg focus:ring-0 focus:bg-surface-container-lowest transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password">
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-4 flex items-center text-tertiary hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-stack-sm">
<button class="w-full bg-coach-orange text-on-primary rounded-xl py-4 font-title-md text-title-md shadow-[0_4px_15px_rgba(242,107,56,0.2)] hover:opacity-90 active:scale-95 transition-all duration-200 flex justify-center items-center gap-2" type="submit">
                        Log In
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">login</span>
</button>
</div>
<!-- Divider -->
<div class="relative flex items-center py-stack-md">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink-0 mx-4 font-body-sm text-body-sm text-on-surface-variant">Or continue with</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<!-- Social Logins -->
<div class="space-y-stack-sm">
<button class="w-full bg-surface-container-low hover:bg-surface-container text-on-surface rounded-xl py-3.5 font-title-md text-title-md border border-surface-variant active:scale-95 transition-all duration-200 flex justify-center items-center gap-3" type="button">
<img alt="Apple logo" class="w-5 h-5 object-contain" src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
                        Apple
                    </button>
<button class="w-full bg-surface-container-low hover:bg-surface-container text-on-surface rounded-xl py-3.5 font-title-md text-title-md border border-surface-variant active:scale-95 transition-all duration-200 flex justify-center items-center gap-3" type="button">
<img alt="Google logo" class="w-5 h-5 object-contain" src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
                        Google
                    </button>
</div>
<!-- Spacer to push sign up to bottom if needed -->
<div class="flex-1"></div>
<!-- Sign Up Link -->
<div class="text-center pt-stack-lg pb-stack-sm">
<p class="font-body-md text-body-md text-on-surface-variant">
                        New to ProteinPlate AI? 
                        <a class="font-title-md text-title-md text-coach-orange hover:opacity-80 transition-opacity ml-1" href="#">Sign Up</a>
</p>
</div>
</form>
</div>
</main>
<!-- Navigation suppressed per rules: Linear/Transactional page intent -->
