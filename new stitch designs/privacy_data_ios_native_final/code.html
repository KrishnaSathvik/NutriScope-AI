<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Privacy &amp; Data - Kinetic Harvest</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800&amp;display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

        tailwind.config = {
            darkMode: "class",

                extend: {
                    "colors": {

                        "inverse-surface": "#313030",
                        "on-primary-fixed": "#380c00",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e6e1e1",
                        "gauge-track": "#eae7e7",
                        "on-tertiary-fixed-variant": "#005314",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#dfe0ff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#822800",
                        "secondary": "#545a94",
                        "background": "#fdf8f8",
                        "secondary-fixed-dim": "#bdc2ff",
                        "primary-container": "#a93702",
                        "on-error": "#ffffff",
                        "surface": "#fcf9f8",
                        "outline-variant": "#e0c0b5",
                        "error-container": "#ffdad6",
                        "surface-tint": "#a93702",
                        "on-surface": "#1c1b1b",
                        "secondary-container": "#b7bcfd",
                        "on-surface-variant": "#58423a",
                        "inverse-on-surface": "#f4f0ef",
                        "primary-fixed-dim": "#ffb59c",
                        "surface-bright": "#fdf8f8",
                        "on-secondary-fixed": "#0e144d",
                        "on-secondary-fixed-variant": "#3c427a",
                        "inverse-primary": "#ffb59c",
                        "surface-dim": "#ddd9d8",
                        "on-tertiary-fixed": "#002204",
                        "tertiary-fixed-dim": "#7edb7c",
                        "tertiary": "#005314",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#ffcdbd",
                        "surface-container-highest": "#e6e1e1",
                        "tertiary-container": "#006e1d",
                        "surface-container-low": "#f7f2f2",
                        "glass-border": "rgba(255, 255, 255, 0.9)",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#ffdbcf",
                        "on-background": "#1c1b1b",
                        "surface-container-high": "#ece7e7",
                        "tertiary-fixed": "#99f895",
                        "glass-bg": "rgba(255, 255, 255, 0.7)",
                        "primary": "#812700",
                        "on-tertiary-container": "#8fee8c",
                        "surface-container": "#f1edec",
                        "on-secondary-container": "#444a83",
                        "outline": "#8c7168"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "48px",
                        "md": "24px",
                        "margin-desktop": "40px",
                        "sm": "12px",
                        "xl": "80px",
                        "base": "8px",
                        "xs": "4px",
                        "gutter": "24px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],
                        "display-lg-mobile": ["Hanken Grotesk"],
                        "label-caps": ["Hanken Grotesk"],

                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800" }]

                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.background');
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Subtle glass gradient background */
        .glass-background {
            background: radial-gradient(circle at top right, rgba(169, 55, 2, 0.05), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(84, 90, 148, 0.05), transparent 40%);
            background-attachment: fixed;
        }

        /* iOS-style inset grouped list card */
        .inset-group {
            background-color: theme('colors.surface-container-lowest');
            border-radius: theme('borderRadius.DEFAULT');
            overflow: hidden;
            border: 1px solid theme('colors.surface-container-highest');
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .list-item-border:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 56px; /* Align with text, skipping icon */
            right: 0;
            height: 1px;
            background-color: theme('colors.surface-container-highest');
        }
    </style>
</head>
<body class="glass-background text-on-surface antialiased min-h-screen flex flex-col">
<!-- Top Navigation (Back Action Context - Nav Shell Suppressed) -->
<header class="flex justify-between items-center px-margin-mobile h-16 w-full z-50 sticky top-0 bg-surface/90 backdrop-blur-md border-b border-surface-container-highest/50">
<button aria-label="Go Back" class="flex items-center text-primary active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-[24px]">chevron_left</span>
<span class="font-body-md text-body-md ml-1 -mt-0.5">Settings</span>
</button>
<div class="w-8"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 w-full max-w-2xl mx-auto px-margin-mobile pb-xl pt-4">
<!-- Large Title Header -->
<div class="mb-8">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-2">Privacy &amp; Data</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Manage how Kinetic Harvest handles your personal wellness and dietary information.</p>
</div>
<!-- Data Management Section -->
<section class="mb-8">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-4 mb-2 tracking-wider">Data Management</h2>
<div class="inset-group">
<!-- Export Data -->
<button class="w-full flex items-center p-4 relative list-item-border active:bg-surface-container-low transition-colors text-left group">
<div class="w-8 h-8 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center mr-4 shrink-0">
<span class="material-symbols-outlined text-[20px]">ios_share</span>
</div>
<div class="flex-1 min-w-0">
<div class="font-body-lg text-body-lg text-on-surface truncate">Export Health Data</div>
<div class="font-caption text-caption text-on-surface-variant truncate">Download a copy of your meal logs</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant ml-2 opacity-50 group-hover:opacity-100 transition-opacity">chevron_right</span>
</button>
<!-- Clear Cache -->
<button class="w-full flex items-center p-4 relative list-item-border active:bg-surface-container-low transition-colors text-left group">
<div class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center mr-4 shrink-0">
<span class="material-symbols-outlined text-[20px]">delete_sweep</span>
</div>
<div class="flex-1 min-w-0">
<div class="font-body-lg text-body-lg text-on-surface truncate">Clear App Cache</div>
<div class="font-caption text-caption text-on-surface-variant truncate">Free up 124 MB of local storage</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant ml-2 opacity-50 group-hover:opacity-100 transition-opacity">chevron_right</span>
</button>
</div>
<p class="font-caption text-caption text-on-surface-variant mt-2 ml-4">Exporting data may take a few minutes depending on your history.</p>
</section>
<!-- Legal Section -->
<section class="mb-10">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-4 mb-2 tracking-wider">Legal</h2>
<div class="inset-group">
<!-- Privacy Policy -->
<button class="w-full flex items-center p-4 relative list-item-border active:bg-surface-container-low transition-colors text-left group">
<div class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center mr-4 shrink-0">
<span class="material-symbols-outlined text-[20px]">policy</span>
</div>
<div class="flex-1 min-w-0">
<div class="font-body-lg text-body-lg text-on-surface truncate">Privacy Policy</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant ml-2 opacity-50 group-hover:opacity-100 transition-opacity">open_in_new</span>
</button>
<!-- Terms of Service -->
<button class="w-full flex items-center p-4 relative list-item-border active:bg-surface-container-low transition-colors text-left group">
<div class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center mr-4 shrink-0">
<span class="material-symbols-outlined text-[20px]">description</span>
</div>
<div class="flex-1 min-w-0">
<div class="font-body-lg text-body-lg text-on-surface truncate">Terms of Service</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant ml-2 opacity-50 group-hover:opacity-100 transition-opacity">open_in_new</span>
</button>
</div>
</section>
<!-- Danger Zone -->
<section class="mt-8">
<div class="inset-group">
<button class="w-full flex items-center p-4 active:bg-error-container/20 transition-colors text-left">
<div class="w-8 h-8 rounded-full bg-error-container text-error flex items-center justify-center mr-4 shrink-0">
<span class="material-symbols-outlined text-[20px]">person_remove</span>
</div>
<div class="flex-1 min-w-0">
<div class="font-body-lg text-body-lg text-error font-medium truncate">Delete Account</div>
</div>
</button>
</div>
<p class="font-caption text-caption text-on-surface-variant mt-2 ml-4">This action is permanent and cannot be undone.</p>
</section>
</main>
</body></html>
