            </h1>
<!-- Container to prevent layout shift during text changes -->
<div class="relative w-full h-8 flex justify-center items-center">
<p class="font-body-lg text-body-lg text-on-surface-variant absolute transition-opacity duration-500 ease-in-out opacity-100 w-full text-center px-4" id="loading-message">
                    Analyzing your activity level...
                </p>
</div>
</div>
</main>
<!-- Subtle Brand Anchor -->
<div class="absolute bottom-margin-main w-full flex justify-center pb-safe">

            ProteinPlate AI
        </span>
</div>
<!-- Micro-interaction Script for Dynamic Text -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const messages = [
                "Analyzing your activity level...",
                "Optimizing protein targets...",
                "Calibrating macro ratios...",
                "Building your custom coach profile...",
                "Finalizing your nutrition strategy..."
            ];
            
            const messageElement = document.getElementById('loading-message');
            let currentIndex = 0;

            setInterval(() => {
                // Fade out
                messageElement.style.opacity = '0';
                
                setTimeout(() => {
                    // Update text and fade in
                    currentIndex = (currentIndex + 1) % messages.length;
                    messageElement.textContent = messages[currentIndex];
                    messageElement.style.opacity = '1';
                }, 500); // Wait for fade out to complete (matches tailwind duration-500)
                
            }, 3000); // Change message every 3 seconds
        });
    </script>
