<style>
        body {
            background-color: #fdf8f8;
            background-image: radial-gradient(circle at top right, rgba(169, 55, 2, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at bottom left, rgba(84, 90, 148, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }
        
        .glass-card {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 24px -8px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .glass-card:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 32px -8px rgba(0, 0, 0, 0.08);
        }

        .chart-gradient-line {
            stroke: url(#primaryGradient);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 4px 6px rgba(169, 55, 2, 0.2));
            animation: drawLine 2s ease-out forwards;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }

        .chart-point {
            fill: #ffffff;
            stroke: #a93702;
            stroke-width: 3;
            transition: r 0.2s ease, filter 0.2s ease;
            cursor: pointer;
        }
        
        .chart-point:hover {
            r: 8;
            filter: drop-shadow(0 0 8px rgba(169, 55, 2, 0.5));
        }

        .goal-arc-bg {
            stroke: #eae7e7;
            stroke-width: 12;
            fill: none;
            stroke-linecap: round;
        }

        .goal-arc-fg {
            stroke: url(#goalGradient);
            stroke-width: 12;
            fill: none;
            stroke-linecap: round;
            stroke-dasharray: 200;
            stroke-dashoffset: 60; /* Adjust for progress */
            transition: stroke-dashoffset 1s ease-out;
            filter: drop-shadow(0 2px 8px rgba(169, 55, 2, 0.3));
        }

        .fab-shadow {
            box-shadow: 0 8px 24px -4px rgba(169, 55, 2, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<!-- Main Canvas -->

<circle class="chart-point" cx="750" cy="50" r="6" style="filter: drop-shadow(0 0 8px rgba(169, 55, 2, 0.8));"></circle>
</svg>
</div>
</div>

<div class="md:col-span-4 flex flex-col gap-md">
