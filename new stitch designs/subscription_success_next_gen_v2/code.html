<style>
        .confetti-piece {
            position: absolute;
            background: #ffd300;
            top: -20px;
            opacity: 0;
            transform: translateY(-100%);
            animation: fall 4s ease-in-out infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
    </style>

<script>
        // Refined Layered Confetti Generator
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#812700', '#a93702', '#ffcdbd', '#545a94', '#99f895', '#ffffff'];
            const confettiCount = 60;

            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-piece');
                
                // Randomize position and animation
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = `${Math.random() * 4}s`;
                confetti.style.animationDuration = `${3 + Math.random() * 3}s`;
                
                // Layering & Depth
                const depth = Math.random();
                if (depth < 0.3) {
                    // Background layer (smaller, blurry, slower)
                    confetti.style.width = '6px';
                    confetti.style.height = '12px';
                    confetti.style.filter = 'blur(2px)';
                    confetti.style.opacity = '0.5';
                    confetti.style.zIndex = '1';
                } else if (depth > 0.7) {
                    // Foreground layer (larger, sharp, faster)
                    confetti.style.width = '12px';
                    confetti.style.height = '24px';
                    confetti.style.filter = 'blur(0px)';
                    confetti.style.opacity = '1';
                    confetti.style.zIndex = '15'; // Above card
                } else {
                    // Mid layer
                    confetti.style.width = '8px';
                    confetti.style.height = '16px';
                    confetti.style.filter = 'blur(1px)';
                    confetti.style.opacity = '0.8';
                    confetti.style.zIndex = '5';
                }

                // Randomize shape slightly
                if(Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                    const size = depth < 0.3 ? '8px' : depth > 0.7 ? '16px' : '10px';
                    confetti.style.width = size;
                    confetti.style.height = size;
                }

                container.appendChild(confetti);
            }
        });
    </script>
