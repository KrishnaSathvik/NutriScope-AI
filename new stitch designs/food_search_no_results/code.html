</button>

<div class="pl-4 pr-2 text-on-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined">search</span>
</div>
<input class="w-full bg-transparent border-none py-3 text-body-lg font-body-lg text-on-surface focus:ring-0 placeholder:text-on-surface-variant/40" placeholder="Search for a food..." type="text" value="Spicy Miso Ramen"/>
<button aria-label="Clear search" class="pr-4 pl-2 text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">cancel</span>
</button>
</div>
<!-- Quick filters as context -->
<div class="flex gap-2 mt-4 overflow-x-auto pb-2 no-scrollbar px-2">
<span class="px-4 py-1.5 rounded-full bg-surface-container border border-surface-variant text-label-bold font-label-bold text-on-surface-variant whitespace-nowrap opacity-60">All Foods</span>
<span class="px-4 py-1.5 rounded-full bg-surface-container border border-surface-variant text-label-bold font-label-bold text-on-surface-variant whitespace-nowrap opacity-60">My Meals</span>
<span class="px-4 py-1.5 rounded-full bg-surface-container border border-surface-variant text-label-bold font-label-bold text-on-surface-variant whitespace-nowrap opacity-60">Favorites</span>

<button class="flex items-center justify-center gap-2 bg-glass-bg backdrop-blur-md border border-glass-border text-on-surface px-8 py-4 rounded-full font-label-bold text-label-bold shadow-sm hover:bg-surface-variant/50 transition-colors duration-300 active:scale-95">

<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="smart_toy">smart_toy</span>
