<style>
        body {
            /* Hybrid Bento-Box Grid / iOS App styling baseline */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="bg-surface-container-low h-screen w-screen flex flex-col justify-center items-center overflow-hidden font-body-md text-on-surface">
<!-- Permission Modal Container -->
<main class="w-full max-w-[400px] px-margin-mobile flex flex-col items-center justify-center h-full relative z-10 text-center animate-[fadeIn_0.3s_ease-out]">
<!-- Icon Graphic -->
<div class="w-32 h-32 mb-8 rounded-full bg-primary-container/10 flex items-center justify-center relative">
<div class="absolute inset-0 rounded-full bg-primary-container/20 animate-ping opacity-20"></div>
<span class="material-symbols-outlined text-primary text-5xl z-10" style="font-size: 64px;">
                photo_camera
            </span>
</div>
<!-- Typography -->
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary mb-4 w-full">
            Enable Camera
        </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-12 max-w-sm px-4">
            Kinetic Harvest uses your camera to scan meals instantly, providing precise nutritional data and AI-powered wellness insights without manual logging.
        </p>
<!-- Actions -->
<div class="w-full flex flex-col gap-4 mt-auto mb-12 md:mb-0 md:mt-8">
<button class="w-full py-4 px-6 rounded-full bg-primary text-on-primary font-label-bold text-label-bold flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-[20px]">check_circle</span>
                Allow Access
            </button>
<button class="w-full py-4 px-6 rounded-full bg-surface-variant/50 text-on-surface-variant font-label-bold text-label-bold hover:bg-surface-variant transition-colors duration-200">
                Maybe Later
            </button>
</div>
</main>
<!-- Subtle Background Elements for 'Premium Wellness' aesthetic -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary-fixed blur-[100px] opacity-40 mix-blend-multiply"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[60%] h-[60%] rounded-full bg-secondary-fixed blur-[120px] opacity-30 mix-blend-multiply"></div>
</div>
