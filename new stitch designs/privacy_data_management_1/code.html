<body class="bg-background min-h-screen text-on-surface antialiased pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface-bright shadow-sm flex justify-between items-center px-margin-main h-16 transition-all duration-300">
<!-- Leading Action: Back (since it's a sub-page, we use a back button instead of an avatar) -->
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors focus:outline-none focus:ring-2 focus:ring-coach-orange focus:ring-opacity-50">
<span class="material-symbols-outlined text-on-surface-variant text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
<!-- Headline -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface text-center flex-1">
            Privacy &amp; Data
        </h1>
<!-- Trailing Action: Help -->
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors focus:outline-none focus:ring-2 focus:ring-coach-orange focus:ring-opacity-50">
<span class="material-symbols-outlined text-on-surface-variant text-2xl" data-icon="help_outline">help_outline</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 px-margin-main max-w-2xl mx-auto space-y-stack-lg">
<!-- Header Section -->
<section class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-fixed mb-4">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="shield_person">shield_person</span>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">Your Data. Your Control.</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">
                Nutriscope AI is designed to support you, not track you. Manage your personal information and privacy settings below.
            </p>
</section>
<!-- Data Management Group -->
<section class="bg-paper-white rounded-xl ambient-shadow p-gutter-card space-y-2">
<h3 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-4 px-2">Data Management</h3>
<!-- Export Data Item -->
<button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors group focus:outline-none focus:bg-surface-container-low">
<div class="flex items-center gap-4 text-left">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center group-hover:bg-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="download">download</span>
</div>
<div>
<div class="font-title-md text-title-md text-on-surface">Data Export</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">Download a copy of your meal history and stats.</div>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Divider -->
<hr class="border-surface-variant mx-14"/>
<!-- Clear Local Cache Item -->
<button class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors group focus:outline-none focus:bg-surface-container-low">
<div class="flex items-center gap-4 text-left">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center group-hover:bg-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="cleaning_services">cleaning_services</span>
</div>
<div>
<div class="font-title-md text-title-md text-on-surface">Clear Local Data</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">Free up space by removing cached images and temporary files.</div>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
</section>
<!-- Legal & Policies Group -->
<section class="bg-paper-white rounded-xl ambient-shadow p-gutter-card space-y-2">
<h3 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider mb-4 px-2">Legal &amp; Policies</h3>
<!-- Privacy Policy Item -->
<a class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors group focus:outline-none focus:bg-surface-container-low" href="#">
<div class="flex items-center gap-4 text-left">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center group-hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="policy">policy</span>
</div>
<div class="font-title-md text-title-md text-on-surface">Privacy Policy</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="open_in_new">open_in_new</span>
</a>
<!-- Divider -->
<hr class="border-surface-variant mx-14"/>
<!-- Terms of Service Item -->
<a class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors group focus:outline-none focus:bg-surface-container-low" href="#">
<div class="flex items-center gap-4 text-left">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center group-hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="description">description</span>
</div>
<div class="font-title-md text-title-md text-on-surface">Terms of Service</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="open_in_new">open_in_new</span>
</a>
</section>
<!-- Danger Zone -->
<section class="mt-stack-lg pt-stack-md flex justify-center">
<button class="flex items-center gap-2 px-6 py-4 rounded-xl text-error bg-error-container hover:bg-error hover:text-on-error transition-all duration-200 active:scale-95 focus:outline-none focus:ring-2 focus:ring-error focus:ring-opacity-50">
<span class="material-symbols-outlined" data-icon="delete_forever">delete_forever</span>
<span class="font-title-md text-title-md">Delete All Account Data</span>
</button>
</section>
</main>
<!-- Navigation Shell suppressed because this is a sub-page with a "Back" action, implying a temporary departure from the main flow. -->
