<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nutriscope AI - Grocery List</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>

            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#735c00",

                        "secondary-container": "#fdd34d",

                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fbf9f4",

                        "inverse-on-surface": "#f2f1ec",
                        "primary-container": "#f26b38",
                        "on-primary-fixed-variant": "#822800",
                        "on-background": "#1b1c19",
                        "on-primary-container": "#561700",
                        "on-tertiary-container": "#2c2d31",
                        "primary": "#a93702",
                        "surface-container-highest": "#e4e2dd",
                        "on-surface-variant": "#58423a",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#725b00",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#dbdad5",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6cb",
                        "on-secondary-fixed": "#241a00",

                        "ink-black": "#1C1C1E",

                        "paper-white": "#FFFFFF",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "1rem",
                        "stack-sm": "0.5rem",
                        "stack-lg": "1.5rem",
                        "margin-main": "1.25rem",
                        "gutter-card": "1rem"
                    },
                    "fontFamily": {
                        "title-md": ["-apple-system", "BlinkMacSystemFont", "sans-serif"],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface-bright text-on-surface antialiased min-h-screen flex flex-col font-sans selection:bg-primary-container selection:text-white relative">
<!-- TopAppBar -->
<header class="fixed w-full z-50 bg-surface-bright/90 backdrop-blur-md flex justify-between items-center px-4 h-[44px] mt-12 border-b border-surface-variant/50">
<button aria-label="User profile" class="text-primary font-semibold text-[17px] active:opacity-70 transition-opacity">
        Profile
    </button>
<h1 class="font-semibold text-[17px] tracking-tight">Grocery List</h1>
<button aria-label="Notifications" class="text-primary active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-[24px]" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Canvas: Empty State Content -->
<main class="flex-grow flex flex-col items-center justify-center pt-24 pb-28 px-4 text-center max-w-md mx-auto w-full">
<!-- Minimalist iOS Icon -->
<div class="mb-6 flex items-center justify-center">
<span class="material-symbols-outlined text-[80px] text-tertiary opacity-40" data-icon="shopping_basket">shopping_basket</span>
</div>
<!-- Typography & Messaging -->
<h2 class="text-[22px] font-semibold text-on-surface mb-2 tracking-tight">
            Your grocery list is empty
        </h2>
<p class="text-[15px] leading-[20px] text-on-surface-variant mb-8 max-w-[90%] mx-auto opacity-80">
            Add recommended meals from Tomorrow's Plan to get started.
        </p>
<!-- Primary Action -->
<button class="bg-primary-container text-white w-full max-w-[343px] h-[50px] rounded-xl font-semibold text-[17px] active:opacity-70 transition-opacity flex items-center justify-center">
            View Tomorrow's Plan
        </button>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-2 pb-6 pt-2 bg-surface-bright/90 backdrop-blur-md border-t border-surface-variant/50 md:hidden">
<!-- TODAY -->
<a class="flex flex-col items-center justify-center w-[72px] text-on-surface-variant opacity-60 active:opacity-40 transition-opacity" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="calendar_today">calendar_today</span>
<span class="font-label-caps text-label-caps">Today</span>
</a>
<!-- MEALS (Active State) -->
<a class="flex flex-col items-center justify-center w-[72px] text-coach-orange" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="restaurant" data-weight="fill" style="font-variation-settings: 'FILL' 1;">restaurant</span>
<span class="font-label-caps text-label-caps">Meals</span>
</a>
<!-- SCAN -->
<a class="flex flex-col items-center justify-center w-[72px] text-on-surface-variant opacity-60 active:opacity-40 transition-opacity" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="center_focus_strong">center_focus_strong</span>
<span class="font-label-caps text-label-caps">Scan</span>
</a>
<!-- COACH -->
<a class="flex flex-col items-center justify-center w-[72px] text-on-surface-variant opacity-60 active:opacity-40 transition-opacity" href="#">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="psychology">psychology</span>
<span class="font-label-caps text-label-caps">Coach</span>
</a>
</nav>
</body></html>
