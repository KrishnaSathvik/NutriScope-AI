<!DOCTYPE html><html lang="en"><head>

                            "on-surface-variant": "#58423a",
                            "primary-fixed-dim": "#ffb59c",

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }
        .radial-gradient-bg {
            background: radial-gradient(circle at 50% -20%, var(--tw-colors-primary-container) 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, var(--tw-colors-primary-fixed) 0%, transparent 50%),
                        var(--tw-colors-background);
            opacity: 0.8;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen relative overflow-hidden">
<!-- Ambient Background -->
<div class="absolute inset-0 radial-gradient-bg z-[-1]"></div>
<!-- Navigation Bar (Task focused, so standard shell is suppressed, using iOS style nav) -->
<header class="w-full top-0 sticky bg-surface/80 backdrop-blur-md z-50 px-margin-mobile h-16 flex items-center justify-between border-b border-surface-variant">
<button class="flex items-center text-primary hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined mr-1" style="font-variation-settings: 'FILL' 0;">arrow_back_ios</span>
<span class="font-body-md text-body-md">Profile</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface absolute left-1/2 transform -translate-x-1/2">Grocery List</h1>
<div class="w-16"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas - Empty State -->
<main class="flex flex-col items-center justify-center min-h-[calc(100vh-64px)] px-margin-mobile py-lg text-center">
<!-- Illustration Area -->
<div class="relative w-48 h-48 mb-lg flex items-center justify-center">
<!-- Glassmorphism decorative circle behind illustration -->
<div class="absolute inset-0 rounded-full bg-primary-fixed/30 blur-2xl"></div>
<div class="w-32 h-32 rounded-full glass-panel flex items-center justify-center shadow-lg transform hover:scale-105 transition-transform duration-300">
<span class="material-symbols-outlined text-primary-container text-[64px]" style="font-variation-settings: 'FILL' 0;">shopping_basket</span>
</div>
</div>
<!-- Typography -->
<h2 class="font-headline-md text-headline-md text-on-surface mb-sm">Your grocery list is empty</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto mb-lg">
            Add recommended meals from Tomorrow's Plan to get started.
        </p>
<!-- Primary Action -->
<button class="bg-primary text-on-primary font-label-bold text-label-bold px-md py-sm rounded-full flex items-center gap-2 shadow-[0_8px_20px_rgba(169,55,2,0.2)] hover:bg-primary-container hover:scale-[1.02] transition-all active:scale-95 w-full max-w-[300px] justify-center">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
            View Tomorrow's Plan
        </button>
</main>
</body></html>
