<!DOCTYPE html><html class="h-full" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Goal Selection - ProteinPlate AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#380c00",
                    "on-secondary-fixed-variant": "#3c427a",
                    "on-tertiary-fixed": "#002204",
                    "background": "#fdf8f8",
                    "secondary-container": "#b7bcfd",
                    "primary-container": "#a93702",
                    "glass-bg": "rgba(255, 255, 255, 0.7)",
                    "primary-fixed-dim": "#ffb59c",
                    "on-secondary": "#ffffff",
                    "inverse-surface": "#313030",
                    "on-primary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#a93702",
                    "secondary": "#545a94",
                    "glass-border": "rgba(255, 255, 255, 0.9)",
                    "on-error-container": "#93000a",
                    "error": "#ba1a1a",
                    "surface-container-highest": "#e6e1e1",
                    "surface-variant": "#e6e1e1",
                    "primary": "#812700",
                    "on-surface-variant": "#58423a",
                    "on-primary-container": "#ffcdbd",
                    "inverse-on-surface": "#f4f0ef",
                    "surface-container-high": "#ece7e7",
                    "tertiary-container": "#006e1d",
                    "surface-dim": "#ddd9d8",
                    "on-surface": "#1c1b1b",
                    "tertiary-fixed": "#99f895",
                    "on-secondary-container": "#444a83",
                    "surface": "#fcf9f8",
                    "secondary-fixed-dim": "#bdc2ff",
                    "on-tertiary-container": "#8fee8c",
                    "tertiary-fixed-dim": "#7edb7c",
                    "surface-container": "#f1edec",
                    "on-secondary-fixed": "#0e144d",
                    "on-primary-fixed-variant": "#822800",
                    "gauge-track": "#eae7e7",
                    "on-error": "#ffffff",
                    "secondary-fixed": "#dfe0ff",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f7f2f2",
                    "surface-bright": "#fdf8f8",
                    "on-tertiary-fixed-variant": "#005314",
                    "on-background": "#1c1b1b",
                    "outline": "#8c7168",
                    "outline-variant": "#e0c0b5",
                    "inverse-primary": "#ffb59c",
                    "primary-fixed": "#ffdbcf",
                    "tertiary": "#005314"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "md": "24px",
                    "xl": "80px",
                    "margin-mobile": "16px",
                    "lg": "48px",
                    "gutter": "24px",
                    "margin-desktop": "40px",
                    "sm": "12px",
                    "base": "8px"
            },
            "fontFamily": {
                    "body-md": ["Hanken Grotesk"],
                    "caption": ["Hanken Grotesk"],
                    "display-lg-mobile": ["Hanken Grotesk"],
                    "label-bold": ["Hanken Grotesk"],
                    "label-caps": ["Hanken Grotesk"],
                    "headline-md": ["Hanken Grotesk"],
                    "body-lg": ["Hanken Grotesk"],
                    "display-lg": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                    "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                    "display-lg-mobile": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                    "label-bold": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                    "label-caps": ["10px", { "lineHeight": "12px", "letterSpacing": "0.1em", "fontWeight": "700" }],
                    "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                    "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                    "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800" }]
            }
          }
        }
      }
    </script>
<style>
        .radial-bg {
            background: radial-gradient(circle at top right, rgba(169, 55, 2, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(169, 55, 2, 0.03) 0%, transparent 40%);
        }
        .card-selected {
            border-color: theme('colors.primary');
            background-color: theme('colors.primary-fixed');
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(169, 55, 2, 0.15);
        }
        .card-unselected {
            border-color: theme('colors.outline-variant');
            background-color: theme('colors.glass-bg');
            transform: scale(1);
        }
    </style>
</head>
<body class="bg-background text-on-background h-full font-body-md antialiased radial-bg relative overflow-hidden flex flex-col">
<!-- Progress Indicator -->
<div class="w-full pt-12 px-margin-mobile pb-4">
<div class="flex items-center justify-between">
<button class="p-2 -ml-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex gap-2">
<div class="h-2 w-8 bg-primary rounded-full"></div>
<div class="h-2 w-8 bg-surface-variant rounded-full"></div>
<div class="h-2 w-8 bg-surface-variant rounded-full"></div>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile pb-32">
<header class="mb-8 mt-4">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-2">What's your goal?</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Select your primary focus to help us personalize your nutrition plan.</p>
</header>
<!-- Goal Selection Cards -->
<div class="flex flex-col gap-4">
<!-- Card 1: Build Muscle -->
<button class="goal-card text-left w-full p-6 rounded-lg border-2 card-selected transition-all duration-300 backdrop-blur-md relative overflow-hidden group">
<div class="flex items-start gap-4 relative z-10">
<div class="p-3 bg-primary/10 rounded-full text-primary shrink-0 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="fitness_center">fitness_center</span>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-1">Build Muscle</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Focus on protein intake and caloric surplus for hypertrophy.</p>
</div>
<div class="ml-auto flex items-center justify-center h-6 w-6 rounded-full border-2 border-primary bg-primary text-on-primary">
<span class="material-symbols-outlined text-sm font-bold" data-icon="check">check</span>
</div>
</div>
</button>
<!-- Card 2: Lose Fat -->
<button class="goal-card text-left w-full p-6 rounded-lg border-2 card-unselected hover:border-primary/50 transition-all duration-300 backdrop-blur-md relative overflow-hidden group">
<div class="flex items-start gap-4 relative z-10">
<div class="p-3 bg-surface-variant rounded-full text-on-surface-variant shrink-0 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="trending_down">trending_down</span>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-1">Lose Fat</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Optimize macros for a sustainable caloric deficit.</p>
</div>
<div class="ml-auto flex items-center justify-center h-6 w-6 rounded-full border-2 border-outline-variant opacity-0">
<span class="material-symbols-outlined text-sm font-bold" data-icon="check">check</span>
</div>
</div>
</button>
<!-- Card 3: Maintenance -->
<button class="goal-card text-left w-full p-6 rounded-lg border-2 card-unselected hover:border-primary/50 transition-all duration-300 backdrop-blur-md relative overflow-hidden group">
<div class="flex items-start gap-4 relative z-10">
<div class="p-3 bg-surface-variant rounded-full text-on-surface-variant shrink-0 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="scale">scale</span>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-1">Maintenance</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Balance intake to maintain your current physique.</p>
</div>
<div class="ml-auto flex items-center justify-center h-6 w-6 rounded-full border-2 border-outline-variant opacity-0">
<span class="material-symbols-outlined text-sm font-bold" data-icon="check">check</span>
</div>
</div>
</button>
<!-- Card 4: Better Energy -->
<button class="goal-card text-left w-full p-6 rounded-lg border-2 card-unselected hover:border-primary/50 transition-all duration-300 backdrop-blur-md relative overflow-hidden group">
<div class="flex items-start gap-4 relative z-10">
<div class="p-3 bg-surface-variant rounded-full text-on-surface-variant shrink-0 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="bolt">bolt</span>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-1">Better Energy</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Improve nutrient timing and whole food sources.</p>
</div>
<div class="ml-auto flex items-center justify-center h-6 w-6 rounded-full border-2 border-outline-variant opacity-0">
<span class="material-symbols-outlined text-sm font-bold" data-icon="check">check</span>
</div>
</div>
</button>
</div>
</main>
<!-- Bottom Fixed Action Area -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile pb-8 bg-gradient-to-t from-background via-background/90 to-transparent pt-8 z-50">
<button class="w-full bg-primary text-on-primary font-label-bold text-label-bold py-4 rounded-full shadow-[0_8px_24px_rgba(169,55,2,0.3)] hover:scale-[1.02] active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
            Continue
            <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<script>
        // Simple interaction script for visual feedback
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.goal-card');
            
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    // Reset all cards
                    cards.forEach(c => {
                        c.classList.remove('card-selected');
                        c.classList.add('card-unselected');
                        const iconContainer = c.querySelector('.bg-primary\\/10');
                        if (iconContainer) {
                            iconContainer.classList.replace('bg-primary/10', 'bg-surface-variant');
                            iconContainer.classList.replace('text-primary', 'text-on-surface-variant');
                        }
                        const checkmark = c.querySelector('.ml-auto');
                        checkmark.classList.remove('bg-primary', 'border-primary', 'text-on-primary', 'opacity-100');
                        checkmark.classList.add('border-outline-variant', 'opacity-0');
                    });

                    // Set selected card
                    card.classList.remove('card-unselected');
                    card.classList.add('card-selected');
                    
                    const iconContainer = card.querySelector('.bg-surface-variant');
                    if (iconContainer) {
                        iconContainer.classList.replace('bg-surface-variant', 'bg-primary/10');
                        iconContainer.classList.replace('text-on-surface-variant', 'text-primary');
                    }
                    
                    const checkmark = card.querySelector('.ml-auto');
                    checkmark.classList.remove('border-outline-variant', 'opacity-0');
                    checkmark.classList.add('bg-primary', 'border-primary', 'text-on-primary', 'opacity-100');
                });
            });
        });
    </script>
</body></html>
