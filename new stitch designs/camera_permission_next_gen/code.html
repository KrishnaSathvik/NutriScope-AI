<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body-md text-on-surface antialiased h-screen w-full overflow-hidden relative">
<!-- Full Bleed Background Image -->
<div class="absolute inset-0 bg-cover bg-center transform scale-105" data-alt="A highly detailed, soft-focus, cinematic macro photograph of a vibrant, healthy meal bowl filled with fresh greens, roasted sweet potatoes, quinoa, and a soft-boiled egg. The lighting is bright, natural, and warm, evocative of a sunny morning. The overall aesthetic is premium, clean, and appetizing, matching a light-mode modern wellness app. The depth of field is exceptionally shallow, blurring the background into smooth, creamy shapes to allow foreground UI elements to stand out clearly." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBKtdFA6ibd-u3mF7Gnpyc-Mqls5nK3TYkGCAIU07Lb94EObloHDDPfn53D970sokuFRbf6FIOL3Omt7aFt8Kd2YLIX76SQKTKgdHgtxz3MOZQY2jDewOxE8iAMivqMunYh9fLUKHbT_vi6ENAUJSujY5Zgqc2_yjYYnMJj3dXCObrriNwrmcPqRaFpdjqOHEul4T2Z80CuOhl0HF3f613waGRv7TQaUWzo77GUfZTJ9ccPc3KwwEUHyZS9g0DUbMrMDfySFg7P2roU')">
</div>
<!-- Tonal Stacking Gradient Overlay for depth and text legibility -->
<div class="absolute inset-0 bg-gradient-to-t from-surface/95 via-surface/40 to-transparent"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 h-full w-full max-w-md mx-auto flex flex-col justify-end px-margin-mobile pb-lg pt-24">
<!-- Glassmorphic Permission Card -->
<!-- Translating style guidance: high blur surface (20px blur), semi-transparent, thin white border -->
<div class="bg-glass-bg backdrop-blur-[20px] border border-glass-border rounded-lg p-md shadow-2xl shadow-primary-container/10 flex flex-col items-center text-center opacity-0 translate-y-8 transition-all duration-700 ease-out" id="permission-card">
<!-- Contextual Graphic / Icon -->
<div class="relative w-20 h-20 rounded-full bg-primary-container/10 border border-primary-container/20 flex items-center justify-center mb-md shadow-inner">
<!-- Subtle pulsing ring to indicate scanning/lens -->
<div class="absolute inset-0 rounded-full border-2 border-primary-container/30 animate-ping" style="animation-duration: 3s;"></div>
<span class="material-symbols-outlined text-4xl text-primary-container" style="font-variation-settings: 'FILL' 1;">
                    center_focus_strong
                </span>
</div>
<!-- Typography Hierarchy -->
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-sm tracking-tight">
                Scan your plate.
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-lg max-w-[280px]">
                To analyze macros instantly, Nutriscope needs access to your camera.
            </p>
<!-- Actions Container -->
<div class="w-full flex flex-col gap-sm">
<!-- Primary Action (High-impact) -->
<button class="w-full py-4 rounded-full bg-primary-container text-on-primary font-label-bold text-label-bold flex items-center justify-center gap-2 shadow-lg shadow-primary-container/30 hover:bg-surface-tint active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-[20px]">photo_camera</span>
                    Allow Access
                </button>
<!-- Secondary Action (De-emphasized) -->
<button class="w-full py-4 rounded-full text-on-surface-variant font-label-bold text-label-bold hover:bg-surface-variant/50 active:bg-surface-variant active:scale-95 transition-all duration-200">
                    Not Now
                </button>
</div>
</div>
</main>
<!-- Inline script for entry animation -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.getElementById('permission-card');
            // Trigger the entrance animation slightly after load for a smooth "pop" effect
            setTimeout(() => {
                card.classList.remove('opacity-0', 'translate-y-8');
                card.classList.add('opacity-100', 'translate-y-0');
            }, 150);
        });
    </script>
</body></html>
