<!DOCTYPE html>

<html class="light" lang="en"><head>

<title>Nutriscope AI - Goal Setting</title>

<style>
        .radial-bg {
            background: radial-gradient(circle at top right, rgba(169, 55, 2, 0.05), transparent 50%),
                        radial-gradient(circle at bottom left, rgba(84, 90, 148, 0.05), transparent 50%);
            background-color: theme('colors.background');
        }
        
        .goal-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .goal-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 12px 24px -10px rgba(169, 55, 2, 0.15);
        }
        
        .goal-card.selected {
            border-color: theme('colors.primary-container');
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,219,207,0.4) 100%);
            box-shadow: 0 8px 32px -8px rgba(169, 55, 2, 0.2), inset 0 0 0 2px theme('colors.primary-container');
        }
        
        .goal-card.selected .card-icon {
            color: theme('colors.primary-container');
            background-color: theme('colors.primary-fixed');
        }

        .goal-card.selected .check-icon {
            opacity: 1;
            transform: scale(1);
        }
        
        .progress-glow {
            box-shadow: 0 0 12px 2px rgba(169, 55, 2, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="radial-bg text-on-background min-h-screen flex flex-col font-body-md antialiased overflow-x-hidden selection:bg-primary-container selection:text-white">
<!-- Top Navigation (Onboarding Focus - Suppressed standard shell, custom progress header) -->
<header class="fixed top-0 w-full z-50 bg-glass-bg backdrop-blur-md border-b border-glass-border pt-safe">
<!-- Progress Bar -->
<div class="h-1.5 w-full bg-surface-variant/50">
<div class="h-full bg-gradient-to-r from-primary to-primary-container w-1/3 progress-glow transition-all duration-700 ease-out"></div>
</div>
<div class="flex justify-between items-center px-margin-mobile md:px-margin-desktop h-16 max-w-7xl mx-auto">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant/50 transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface transition-colors" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<span class="font-label-bold text-label-bold text-primary tracking-widest uppercase">Step 2 of 6</span>
<button class="font-label-bold text-label-bold text-on-surface-variant hover:text-primary transition-colors">Skip</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-32 pb-32 px-margin-mobile md:px-margin-desktop max-w-7xl mx-auto w-full flex flex-col items-center">
<!-- Header Section -->
<div class="text-center mb-12 md:mb-16 max-w-2xl">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface tracking-tight mb-4 animate-fade-in-up">What brings you to <span class="text-primary-container">Nutriscope?</span></h1>
<p class="font-body-lg text-body-lg text-on-surface-variant animate-fade-in-up" style="animation-delay: 100ms;">Select your primary goal to help us personalize your nutrition insights and meal recommendations.</p>
</div>
<!-- Goal Selection Grid (Bento Style) -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-5xl">
<!-- Goal 1: Build Muscle -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="primary_goal" type="radio" value="muscle"/>
<div class="goal-card selected h-full bg-glass-bg backdrop-blur-md rounded-xl border border-glass-border p-6 flex flex-col relative overflow-hidden">
<!-- Decorative Background Element -->
<div class="absolute -right-8 -top-8 w-32 h-32 bg-primary-fixed/30 rounded-full blur-2xl pointer-events-none"></div>
<div class="flex justify-between items-start mb-6 z-10">
<div class="card-icon w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-on-surface-variant transition-colors">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<div class="check-icon w-6 h-6 rounded-full bg-primary-container flex items-center justify-center text-white opacity-0 transform scale-50 transition-all duration-300">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<div class="z-10 mt-auto">
<h3 class="font-headline-md text-headline-md-mobile md:text-headline-md text-on-surface mb-2">Build Muscle</h3>
<p class="font-body-md text-body-md text-on-surface-variant">High-protein meal plans designed to support hypertrophy and strength gains.</p>
</div>
</div>
</label>
<!-- Goal 2: Lose Weight -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="primary_goal" type="radio" value="weight_loss"/>
<div class="goal-card h-full bg-glass-bg backdrop-blur-md rounded-xl border border-glass-border p-6 flex flex-col relative overflow-hidden peer-checked:border-primary-container peer-checked:bg-gradient-to-br peer-checked:from-white/90 peer-checked:to-primary-fixed/40 peer-checked:shadow-[0_8px_32px_-8px_rgba(169,55,2,0.2),inset_0_0_0_2px_theme('colors.primary-container')]">
<div class="flex justify-between items-start mb-6 z-10">
<div class="card-icon w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-on-surface-variant transition-colors peer-checked:text-primary-container peer-checked:bg-primary-fixed">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">monitor_weight</span>
</div>
<div class="check-icon w-6 h-6 rounded-full bg-primary-container flex items-center justify-center text-white opacity-0 transform scale-50 transition-all duration-300 peer-checked:opacity-100 peer-checked:scale-100">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<div class="z-10 mt-auto">
<h3 class="font-headline-md text-headline-md-mobile md:text-headline-md text-on-surface mb-2">Lose Weight</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Calorie-conscious insights and satisfying meals for sustainable fat loss.</p>
</div>
</div>
</label>
<!-- Goal 3: Maintain & Health -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="primary_goal" type="radio" value="maintain"/>
<div class="goal-card h-full bg-glass-bg backdrop-blur-md rounded-xl border border-glass-border p-6 flex flex-col relative overflow-hidden peer-checked:border-primary-container peer-checked:bg-gradient-to-br peer-checked:from-white/90 peer-checked:to-primary-fixed/40 peer-checked:shadow-[0_8px_32px_-8px_rgba(169,55,2,0.2),inset_0_0_0_2px_theme('colors.primary-container')]">
<div class="flex justify-between items-start mb-6 z-10">
<div class="card-icon w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-on-surface-variant transition-colors peer-checked:text-primary-container peer-checked:bg-primary-fixed">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="check-icon w-6 h-6 rounded-full bg-primary-container flex items-center justify-center text-white opacity-0 transform scale-50 transition-all duration-300 peer-checked:opacity-100 peer-checked:scale-100">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<div class="z-10 mt-auto">
<h3 class="font-headline-md text-headline-md-mobile md:text-headline-md text-on-surface mb-2">General Wellness</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Balanced macro profiles for maintaining current weight and boosting energy.</p>
</div>
</div>
</label>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 w-full bg-gradient-to-t from-background via-background/90 to-transparent pt-12 pb-safe px-margin-mobile md:px-margin-desktop z-40">
<div class="max-w-2xl mx-auto mb-8">
<button class="w-full bg-primary-container hover:bg-primary text-on-primary font-label-bold text-label-bold py-4 px-8 rounded-full shadow-[0_8px_16px_rgba(169,55,2,0.2)] hover:shadow-[0_12px_24px_rgba(169,55,2,0.3)] transition-all transform hover:-translate-y-1 active:translate-y-0 active:scale-95 flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</div>
<script>
        // Simple JS to handle the visual state change of the custom radio cards
        // Tailwind's peer-checked handles most of it, but we need JS for the initially selected card's special classes 
        // that differ slightly from the pure CSS implementation for robustness.
        const radios = document.querySelectorAll('input[name="primary_goal"]');
        const cards = document.querySelectorAll('.goal-card');

        radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Remove selected class from all
                cards.forEach(card => card.classList.remove('selected'));
                
                // Add to the parent goal-card of the checked radio
                if (e.target.checked) {
                    e.target.closest('.goal-card').classList.add('selected');
                }
            });
        });
    </script>
</body></html>
