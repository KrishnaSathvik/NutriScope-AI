</button>
</div>

</main>
<script>
        // Simple confetti effect
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#F26B38', '#FFD54F', '#a93702', '#ffb59c'];
            const shapes = ['rounded-full', 'rounded-sm'];
            
            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.classList.add(shapes[Math.floor(Math.random() * shapes.length)]);
                
                // Randomize properties
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100 + 'vw';
                const duration = Math.random() * 3 + 2 + 's';
                const delay = Math.random() * 2 + 's';
                const size = Math.random() * 6 + 4 + 'px';
                
                confetti.style.backgroundColor = color;
                confetti.style.left = left;
                confetti.style.top = '-10px';
                confetti.style.width = size;
                confetti.style.height = size;
                confetti.style.animationDuration = duration;
                confetti.style.animationDelay = delay;
                
                container.appendChild(confetti);
            }
        });
    </script>
