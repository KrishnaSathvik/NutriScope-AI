<!-- Vanilla JS Confetti Logic -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#a93702', '#812700', '#ffb59c', '#006e1d', '#8fee8c']; // Brand primary and success colors
            const particleCount = 75;

            for (let i = 0; i < particleCount; i++) {
                createConfetti(container, colors);
            }
        });

        function createConfetti(container, colors) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            
            // Randomize properties
            const left = Math.random() * 100; // 0 to 100 vw
            const animationDuration = 2 + Math.random() * 3; // 2s to 5s
            const animationDelay = Math.random() * 2; // 0s to 2s
            const color = colors[Math.floor(Math.random() * colors.length)];
            const width = 6 + Math.random() * 6; // 6px to 12px
            const height = 12 + Math.random() * 12; // 12px to 24px

            confetti.style.left = `${left}vw`;
            confetti.style.backgroundColor = color;
            confetti.style.width = `${width}px`;
            confetti.style.height = `${height}px`;
            confetti.style.animationDuration = `${animationDuration}s`;
            confetti.style.animationDelay = `${animationDelay}s`;
            
            // Randomly make some circles
            if (Math.random() > 0.5) {
                confetti.style.borderRadius = '50%';
                confetti.style.width = `${width}px`;
                confetti.style.height = `${width}px`;
            }

            container.appendChild(confetti);

            // Cleanup after animation
            setTimeout(() => {
                confetti.remove();
            }, (animationDuration + animationDelay) * 1000);
        }
    </script>
