    body {

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-margin-main md:p-0 relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-warm-sun/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-coach-orange/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="w-full max-w-md relative z-10">
<!-- Header Section -->
<div class="text-center mb-stack-lg">
<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center mx-auto mb-stack-md shadow-[0_4px_20px_0_rgba(242,107,56,0.15)]">
<span class="material-symbols-outlined text-coach-orange text-3xl" data-icon="lock_reset" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-stack-sm">Reset Password</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
                Enter your email and we'll send you a link to reset your password.
            </p>
</div>
<!-- Form Card -->
<div class="bg-paper-white rounded-xl p-gutter-card shadow-[0_8px_30px_0_rgba(242,107,56,0.08)] mb-stack-lg">
<form action="#" class="space-y-stack-md" method="POST">
<!-- Email Input -->
<div class="space-y-stack-sm">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-tertiary" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border-0 bg-surface-container-low rounded-lg text-on-background font-body-lg text-body-lg placeholder:text-tertiary focus:ring-2 focus:ring-coach-orange focus:bg-surface-bright transition-colors" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full flex justify-center py-4 px-4 border border-transparent rounded-xl shadow-[0_4px_15px_0_rgba(242,107,56,0.2)] text-on-primary bg-coach-orange hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-coach-orange font-title-md text-title-md transition-transform active:scale-[0.98] mt-stack-md" type="submit">
                    Send Reset Link
                </button>
</form>
</div>
<!-- Secondary Action -->
<div class="text-center">
<a class="inline-flex items-center font-body-lg text-body-lg text-warm-sun hover:text-secondary-fixed-dim transition-colors group" href="#">
<span class="material-symbols-outlined mr-2 text-xl group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
                Back to Sign In
            </a>
</div>
</div>
