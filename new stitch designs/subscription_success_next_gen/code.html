<style>
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 20px;
            background: #ffd300;
            top: 0;
            opacity: 0;
            transform: translateY(-100%);
            animation: fall 3s ease-in-out infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
            100% { transform: translateY(1000px) rotate(720deg); opacity: 0; }
        }
        .glow-effect {
            box-shadow: 0 0 30px rgba(169, 55, 2, 0.4);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Soft Ambient Background Gradient -->
<div class="absolute inset-0 bg-gradient-to-br from-surface-bright via-primary-fixed to-secondary-fixed opacity-40 z-0"></div>
<!-- Confetti Animation Container -->
<div class="absolute inset-0 z-10 pointer-events-none overflow-hidden" id="confetti-container">
<!-- JS will populate confetti here -->
</div>
<!-- Main Content Canvas -->
<main class="relative z-20 w-full max-w-lg px-margin-mobile flex flex-col items-center justify-center text-center">
<!-- Central Glassmorphic Card -->
<div class="bg-glass-bg backdrop-blur-md border border-glass-border rounded-xl p-lg flex flex-col items-center shadow-lg w-full transform transition-transform hover:scale-[1.01] duration-300">
<!-- Glowing Icon Wrapper -->
<div class="w-32 h-32 rounded-full bg-gradient-to-tr from-primary to-surface-tint flex items-center justify-center mb-md glow-effect relative">
<div class="absolute inset-0 rounded-full border-4 border-glass-border opacity-50"></div>
<span class="material-symbols-outlined text-[64px] text-on-primary" style="font-variation-settings: 'FILL' 1;">
                    trophy
                </span>
</div>
<!-- Typography Hierarchy -->
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary mb-sm tracking-tight">
                You're Pro!
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xs mx-auto">
                Your premium journey to peak performance starts now. Unlock advanced insights and personalized guidance.
            </p>
</div>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full px-margin-mobile pb-lg pt-md bg-gradient-to-t from-surface to-transparent z-30 flex justify-center">
<button class="w-full max-w-lg bg-primary text-on-primary rounded-full py-4 flex items-center justify-center gap-2 font-label-bold text-label-bold shadow-lg shadow-primary/20 hover:bg-surface-tint transition-all active:scale-95 group">
            Get Started
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">
                arrow_forward
            </span>
</button>
</div>
<!-- Interactive Scripts -->
<script>
        // Simple Confetti Generator
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#812700', '#a93702', '#ffcdbd', '#545a94', '#99f895'];
            const confettiCount = 50;

            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-piece');
                
                // Randomize properties
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = `${Math.random() * 3}s`;
                confetti.style.animationDuration = `${3 + Math.random() * 2}s`;
                
                // Randomize shape slightly
                if(Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                    confetti.style.width = '12px';
                    confetti.style.height = '12px';
                }

                container.appendChild(confetti);
            }
        });
    </script>
</body></html>
