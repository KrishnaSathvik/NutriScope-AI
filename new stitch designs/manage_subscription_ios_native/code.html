<style>
        body {
            background-color: #f0eee9; /* iOS Settings background equivalent in this palette */
            -webkit-tap-highlight-color: transparent;
        }
        .inset-grouped-list {
            background-color: #ffffff;
            border-radius: 0.75rem; /* rounded-xl */
            overflow: hidden;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #ffffff;
            position: relative;
        }
        .list-item:active {
            background-color: #eae8e3; /* surface-container-high for active state */
        }
        .list-item:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px;
            right: 0;
            height: 1px;
            background-color: #e0c0b5; /* outline-variant */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="text-on-surface font-body-lg min-h-screen pb-24 md:pb-0">
<!-- Top Navigation Placeholder (Simulating iOS modal nav) -->
<header class="bg-surface/70 dark:bg-surface-container/70 backdrop-blur-md fixed top-0 w-full border-b border-white/90 shadow-sm flex justify-between items-center px-margin-mobile h-16 w-full z-50">
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-150 flex items-center font-body-lg">
<span class="material-symbols-outlined mr-1" style="font-variation-settings: 'FILL' 0;">arrow_back_ios</span>
            Back
        </button>
<h1 class="font-headline-md text-headline-md-mobile font-extrabold text-primary absolute left-1/2 -translate-x-1/2">Subscriptions</h1>
<div class="w-[60px]"></div> <!-- Spacer for centering -->
</header>
<main class="pt-24 px-margin-mobile md:px-8 max-w-2xl mx-auto space-y-stack-lg">
<!-- App Icon and Name Header -->
<div class="flex flex-col items-center pt-4 pb-2">
<div class="w-20 h-20 bg-coach-orange rounded-xl shadow-sm mb-4 flex items-center justify-center relative overflow-hidden">
<span class="material-symbols-outlined text-paper-white text-4xl" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
<div class="absolute inset-0 bg-gradient-to-tr from-black/10 to-transparent"></div>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface text-center">Kinetic Harvest Pro</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1 text-center">Your Premium Coaching Plan</p>
</div>
<!-- Subscription Details Group -->
<div class="space-y-2">
<h3 class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-4">Plan Information</h3>
<div class="inset-grouped-list shadow-sm">
<div class="list-item">
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-on-surface">Kinetic Harvest Pro - Annual</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-0.5">$99.99 / year</span>
</div>
<span class="material-symbols-outlined text-tertiary-container" style="font-variation-settings: 'FILL' 0;">check</span>
</div>
<div class="list-item">
<span class="font-body-lg text-body-lg text-on-surface">Status</span>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-protein-teal"></span>
<span class="font-body-lg text-body-lg text-on-surface-variant">Active</span>
</div>
</div>
<div class="list-item">
<span class="font-body-lg text-body-lg text-on-surface">Renews</span>
<span class="font-body-lg text-body-lg text-on-surface-variant">Oct 15, 2024</span>
</div>
</div>
</div>
<!-- Actions Group -->
<div class="space-y-2">
<h3 class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-4">Manage</h3>
<div class="inset-grouped-list shadow-sm">
<button class="list-item w-full text-left group">
<span class="font-body-lg text-body-lg text-primary group-hover:text-primary-container transition-colors">See All Plans</span>
<span class="material-symbols-outlined text-tertiary-container text-sm" style="font-variation-settings: 'FILL' 0;">chevron_right</span>
</button>
<button class="list-item w-full text-left group">
<span class="font-body-lg text-body-lg text-primary group-hover:text-primary-container transition-colors">Update Payment Method</span>
<span class="material-symbols-outlined text-tertiary-container text-sm" style="font-variation-settings: 'FILL' 0;">chevron_right</span>
</button>
</div>
</div>
<!-- Destructive Group -->
<div class="pt-4">
<div class="inset-grouped-list shadow-sm">
<button class="list-item w-full justify-center group py-4">
<span class="font-body-lg text-body-lg text-error group-hover:opacity-80 transition-opacity font-semibold">Cancel Subscription</span>
</button>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-3 text-center px-4">
                If you cancel now, you can still access Pro features until October 15, 2024.
            </p>
</div>
