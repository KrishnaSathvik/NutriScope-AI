<style>
        .waveform-bar {
            animation: pulse-wave 1.2s infinite ease-in-out;
            transform-origin: bottom;
        }
        
        .waveform-bar:nth-child(1) { animation-delay: 0.0s; }
        .waveform-bar:nth-child(2) { animation-delay: 0.1s; }
        .waveform-bar:nth-child(3) { animation-delay: 0.2s; }
        .waveform-bar:nth-child(4) { animation-delay: 0.3s; }
        .waveform-bar:nth-child(5) { animation-delay: 0.4s; }
        .waveform-bar:nth-child(6) { animation-delay: 0.3s; }
        .waveform-bar:nth-child(7) { animation-delay: 0.2s; }
        .waveform-bar:nth-child(8) { animation-delay: 0.1s; }
        .waveform-bar:nth-child(9) { animation-delay: 0.0s; }

        @keyframes pulse-wave {
            0%, 100% { transform: scaleY(0.2); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        .mic-pulse {
            animation: ring-pulse 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        @keyframes ring-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(242, 107, 56, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 40px rgba(242, 107, 56, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(242, 107, 56, 0); }
        }
        
        .typing-indicator span {
            animation: blink 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface font-body-lg antialiased overflow-hidden min-h-screen relative">
<!-- Blurred Background Context (Dashboard Mockup) -->
<div aria-hidden="true" class="absolute inset-0 z-0 opacity-40 blur-md pointer-events-none filter">
<div class="p-margin-main flex flex-col gap-stack-lg mt-16">
<div class="bg-paper-white rounded-xl p-4 shadow-sm h-32 w-full"></div>
<div class="bg-paper-white rounded-xl p-4 shadow-sm h-48 w-full"></div>
<div class="bg-paper-white rounded-xl p-4 shadow-sm h-24 w-full"></div>
</div>
</div>
<!-- Main Overlay Container -->
<div class="relative z-10 flex flex-col h-screen w-full bg-surface/80 backdrop-blur-xl">
<!-- Header -->
<header class="flex justify-between items-center w-full px-margin-main h-16 shrink-0">
<button aria-label="Close voice input" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<div class="flex items-center gap-2 text-primary-container">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">mic</span>
<span class="font-label-caps text-label-caps uppercase tracking-wider text-on-surface-variant">Voice Entry</span>
</div>
<div class="w-10 h-10"></div> <!-- Spacer for balance -->
</header>
<!-- Central Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-main pb-24">
<!-- Visualization -->
<div class="relative flex items-center justify-center mb-12">
<!-- Outer Pulse Rings -->
<div class="absolute w-32 h-32 rounded-full mic-pulse bg-primary-container/20"></div>
<!-- Inner Mic Circle -->
<div class="relative z-10 w-24 h-24 rounded-full bg-primary-container shadow-[0_8px_32px_rgba(242,107,56,0.4)] flex items-center justify-center transform transition-transform hover:scale-105">
<span class="material-symbols-outlined text-paper-white text-5xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</div>
<!-- Waveform Simulation -->
<div aria-hidden="true" class="flex items-end justify-center gap-1 h-12 mb-8">
<div class="w-2 bg-primary-container rounded-t-full waveform-bar h-full"></div>
<div class="w-2 bg-primary-container rounded-t-full waveform-bar h-full"></div>
<div class="w-2 bg-primary-container rounded-t-full waveform-bar h-full"></div>

<div class="w-2 bg-primary-container rounded-t-full waveform-bar h-full"></div>

<div class="w-2 bg-primary-container rounded-t-full waveform-bar h-full"></div>
<div class="w-2 bg-primary-container rounded-t-full waveform-bar h-full"></div>
<div class="w-2 bg-primary-container rounded-t-full waveform-bar h-full"></div>
</div>
<!-- Status Text -->
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface text-center mb-4 flex items-center justify-center gap-1">
                Listening <span class="typing-indicator flex gap-0.5"><span>.</span><span>.</span><span>.</span></span>
</h2>
<!-- Real-time Transcription Placeholder -->
<div class="w-full max-w-md bg-paper-white/50 backdrop-blur-sm rounded-xl p-6 shadow-sm border border-surface-variant/50 min-h-[120px]">
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed text-center italic">
                    "Grilled chicken breast with half a cup of quinoa and some roasted asparagus..."
                </p>
</div>
</main>
<!-- Floating Actions -->
<div class="fixed bottom-0 left-0 w-full p-margin-main pb-8 flex justify-center items-center gap-4 bg-gradient-to-t from-surface to-transparent">
<!-- Cancel Button -->
<button class="px-6 py-4 rounded-xl font-title-md text-title-md text-on-surface-variant hover:bg-surface-variant transition-colors focus:outline-none focus:ring-2 focus:ring-primary-container/50">
                Cancel
            </button>
<!-- Done Button -->
<button class="flex-1 max-w-[200px] px-8 py-4 rounded-xl bg-coach-orange text-paper-white font-title-md text-title-md shadow-[0_4px_14px_rgba(242,107,56,0.3)] hover:opacity-90 hover:scale-[1.02] active:scale-95 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container">
                Done
            </button>
</div>
