<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(242, 107, 56, 0.05);
        }
        
        /* Smooth input focus transition */
        input:focus + .icon-container .material-symbols-outlined {
            color: #F26B38;
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest min-h-screen font-body-lg text-on-surface flex flex-col antialiased selection:bg-coach-orange selection:text-white relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-warm-sun/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-coach-orange/5 rounded-full blur-3xl pointer-events-none"></div>
<!-- Note: TopAppBar and BottomNavBar are suppressed as this is a linear/transactional screen -->
<main class="flex-grow flex items-center justify-center p-margin-main z-10 w-full max-w-md mx-auto">
<div class="w-full">
<!-- Header Section -->
<div class="text-center mb-stack-lg animate-[fadeInDown_0.5s_ease-out]">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-low mb-stack-md text-coach-orange shadow-[0_4px_16px_0_rgba(242,107,56,0.15)]">
<span class="material-symbols-outlined text-headline-xl" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-on-surface mb-stack-sm">Reset Password</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                    Enter your email address to receive a secure link to reset your password.
                </p>
</div>
<!-- Form Card -->
<div class="glass-card rounded-[24px] p-6 mb-stack-lg border border-surface-container animate-[fadeInUp_0.5s_ease-out_0.1s_both]">
<form class="space-y-stack-md" onsubmit="event.preventDefault(); document.getElementById('success-state').classList.remove('hidden'); document.getElementById('form-state').classList.add('hidden');">
<div class="space-y-stack-md" id="form-state">
<!-- Email Input Group -->
<div class="relative group">
<label class="sr-only" for="email">Email Address</label>
<div class="relative flex items-center">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none icon-container transition-colors duration-200">
<span class="material-symbols-outlined text-on-surface-variant transition-colors duration-200">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container hover:bg-surface-container-high focus:bg-surface-container-lowest border-0 rounded-xl font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant focus:ring-2 focus:ring-coach-orange transition-all duration-200 ease-in-out shadow-sm" id="email" name="email" placeholder="your@email.com" required="" type="email"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full flex items-center justify-center py-4 px-6 rounded-xl bg-coach-orange text-white font-title-md text-title-md shadow-[0_4px_14px_0_rgba(242,107,56,0.39)] hover:shadow-[0_6px_20px_rgba(242,107,56,0.23)] hover:bg-primary active:scale-[0.98] transition-all duration-200 group" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined ml-2 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300">arrow_forward</span>
</button>
</div>
<!-- Success State (Hidden by default) -->
<div class="hidden flex-col items-center justify-center text-center py-4 space-y-stack-md animate-[fadeIn_0.3s_ease-out]" id="success-state">
<div class="w-12 h-12 rounded-full bg-protein-teal/10 flex items-center justify-center text-protein-teal mb-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h3 class="font-title-md text-title-md text-on-surface">Check your inbox</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">
                            We've sent recovery instructions to your email.
                        </p>
</div>
</form>
</div>
<!-- Footer Links -->
<div class="text-center animate-[fadeIn_0.5s_ease-out_0.3s_both]">
<a class="inline-flex items-center text-coach-orange hover:text-primary font-body-lg text-body-lg transition-colors group" href="#">
<span class="material-symbols-outlined mr-2 text-[20px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                    Back to Sign In
                </a>
</div>
</div>
</main>
<script>
        // Optional: Add simple subtle interaction for the input field to make it feel more "Coach-like" and responsive
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('email');
            
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.02]');
            });
            
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.02]');
            });
        });
    </script>
</body></html>
