<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>ProteinPlate AI - Reset Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#dfe0ff",
                        "secondary": "#545a94",
                        "tertiary-fixed-dim": "#7edb7c",
                        "surface-container": "#f1edec",
                        "inverse-on-surface": "#f4f0ef",
                        "secondary-container": "#b7bcfd",
                        "on-primary-fixed": "#380c00",
                        "tertiary": "#005314",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "on-background": "#1c1b1b",
                        "on-tertiary-container": "#8fee8c",
                        "on-secondary-container": "#444a83",
                        "surface-container-highest": "#e6e1e1",
                        "on-surface-variant": "#58423a",
                        "primary-fixed-dim": "#ffb59c",
                        "secondary-fixed-dim": "#bdc2ff",
                        "primary": "#812700",
                        "inverse-primary": "#ffb59c",
                        "on-secondary-fixed": "#0e144d",
                        "surface": "#fcf9f8",
                        "tertiary-container": "#006e1d",
                        "outline-variant": "#e0c0b5",
                        "primary-container": "#a93702",
                        "gauge-track": "#eae7e7",
                        "surface-variant": "#e6e1e1",
                        "surface-dim": "#ddd9d8",
                        "primary-fixed": "#ffdbcf",
                        "on-tertiary-fixed": "#002204",
                        "surface-container-low": "#f7f2f2",
                        "on-tertiary-fixed-variant": "#005314",
                        "on-secondary": "#ffffff",
                        "glass-border": "rgba(255, 255, 255, 0.9)",
                        "surface-container-high": "#ece7e7",
                        "surface-tint": "#a93702",
                        "on-secondary-fixed-variant": "#3c427a",
                        "outline": "#8c7168",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1c1b1b",
                        "on-primary-fixed-variant": "#822800",
                        "on-error": "#ffffff",
                        "background": "#fdf8f8",
                        "on-primary-container": "#ffcdbd",
                        "glass-bg": "rgba(255, 255, 255, 0.7)",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#313030",
                        "tertiary-fixed": "#99f895",
                        "error": "#ba1a1a",
                        "surface-bright": "#fdf8f8"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "xl": "80px",
                        "sm": "12px",
                        "md": "24px",
                        "lg": "48px",
                        "gutter": "24px",
                        "xs": "4px",
                        "margin-desktop": "40px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "caption": ["Hanken Grotesk"],
                        "display-lg-mobile": ["Hanken Grotesk"],
                        "label-caps": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-bold": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "display-lg-mobile": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-caps": ["10px", { "lineHeight": "12px", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-bold": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            /* Soft radial gradient background for premium feel */
            background: radial-gradient(circle at top right, rgba(255, 181, 156, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(223, 224, 255, 0.15) 0%, transparent 40%),
                        var(--color-surface);
            background-color: #fcf9f8;
            -webkit-tap-highlight-color: transparent;
        }
        
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 24px -2px rgba(129, 39, 0, 0.05);
        }

        .input-ios {
            appearance: none;
            -webkit-appearance: none;
        }
        
        /* Ambient shadow for primary button */
        .btn-primary-shadow {
            box-shadow: 0 8px 16px -4px rgba(169, 55, 2, 0.25);
        }
    </style>
</head>
<body class="text-on-surface antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Top Navigation (iOS Style Back) -->
<nav class="absolute top-0 left-0 w-full h-16 flex items-center px-margin-mobile z-50">
<button class="flex items-center text-primary active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-[28px] -ml-2" style="font-variation-settings: 'wght' 300;">chevron_left</span>
<span class="font-body-md text-body-md -ml-1">Back</span>
</button>
</nav>
<!-- Main Content Container -->
<main class="w-full max-w-md px-margin-mobile flex flex-col items-center z-10 pt-16 pb-safe">
<!-- Illustration Area -->
<div class="mb-8 w-32 h-32 rounded-full glass-panel flex items-center justify-center relative shadow-lg">
<!-- Inner soft glow -->
<div class="absolute inset-0 rounded-full bg-primary/5 blur-xl"></div>
<span class="material-symbols-outlined text-primary text-6xl relative z-10" style="font-variation-settings: 'FILL' 1, 'wght' 300;">lock_reset</span>
</div>
<!-- Typography -->
<div class="text-center mb-8">
<h1 class="font-headline-md text-headline-md text-on-surface mb-sm">Reset Password</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">
                Enter your email address to receive a secure link to reset your password.
            </p>
</div>
<!-- Form Area -->
<form class="w-full flex flex-col gap-md" onsubmit="event.preventDefault(); document.getElementById('success-state').classList.remove('hidden'); this.classList.add('hidden');">
<!-- Email Input Glass Card -->
<div class="glass-panel rounded-DEFAULT p-1 focus-within:ring-2 focus-within:ring-primary/20 transition-shadow">
<div class="bg-white/50 rounded-[14px] flex items-center px-4 h-14">
<span class="material-symbols-outlined text-on-surface-variant mr-3" style="font-variation-settings: 'wght' 300;">mail</span>
<input autocomplete="email" class="input-ios w-full bg-transparent border-none p-0 text-on-surface font-body-md text-body-md placeholder:text-on-surface-variant/50 focus:ring-0" placeholder="Email Address" required="" type="email">
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full h-14 bg-primary-container text-on-primary-container rounded-full font-label-bold text-label-bold flex items-center justify-center gap-2 btn-primary-shadow active:scale-[0.98] transition-transform" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Success State (Hidden by default) -->
<div class="hidden w-full flex flex-col items-center text-center animate-[fadeIn_0.3s_ease-out]" id="success-state">
<div class="w-16 h-16 rounded-full bg-tertiary-container/10 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-tertiary-container text-3xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Check Your Email</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-8">
                We've sent a recovery link to your inbox.
            </p>
<button class="font-label-bold text-label-bold text-primary active:opacity-70 transition-opacity" onclick="window.location.reload()">
                Return to Login
            </button>
</div>
</main>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body></html>
