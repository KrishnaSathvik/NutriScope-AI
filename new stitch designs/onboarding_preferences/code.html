<style>
        .chip-selected {
            background-color: theme('colors.primary-container');
            color: theme('colors.on-primary-container');
            border-color: theme('colors.primary-container');
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(242, 107, 56, 0.2);
        }
        .chip-unselected {
            background-color: theme('colors.surface-container-highest');
            color: theme('colors.on-surface');
            border-color: transparent;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, theme('colors.coach-orange') 0%, theme('colors.warm-sun') 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
<!-- Header (No Global Nav since it's an onboarding screen) -->
<header class="w-full flex justify-between items-center px-margin-main h-16 pt-8 pb-4">
<button aria-label="Go Back" class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center p-2 -ml-2 rounded-full active:bg-surface-container-high">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-coach-orange">
            ProteinPlate AI
        </div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content -->
<main class="flex-grow px-margin-main flex flex-col pt-8 pb-24 max-w-md mx-auto w-full">
<!-- Progress Bar -->
<div class="w-full h-2 bg-warm-sun/20 rounded-full mb-stack-lg overflow-hidden">
<div class="h-full w-2/5 progress-bar-fill rounded-full transition-all duration-500 ease-out"></div>
</div>
<!-- Typography Header -->
<h1 class="font-headline-xl text-headline-xl text-on-background mb-stack-sm">
            Tailor your coaching
        </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-stack-lg">
            Select your dietary preferences so we can customize your meal recommendations. Select all that apply.
        </p>
<!-- Selection Chips Container -->
<div class="flex flex-wrap gap-3 mb-stack-lg" id="preferences-container">
<!-- Chips will be generated via JS for interactivity, but we hardcode them here for the design -->
<button class="preference-chip chip-unselected px-4 py-3 rounded-full border-2 transition-all duration-200 flex items-center gap-2" data-value="vegetarian">
<span class="material-symbols-outlined text-[20px]">eco</span>
<span class="font-title-md text-title-md">Vegetarian</span>
</button>
<button class="preference-chip chip-unselected px-4 py-3 rounded-full border-2 transition-all duration-200 flex items-center gap-2" data-value="nonveg">
<span class="material-symbols-outlined text-[20px]">set_meal</span>
<span class="font-title-md text-title-md">Non-veg</span>
</button>
<button class="preference-chip chip-unselected px-4 py-3 rounded-full border-2 transition-all duration-200 flex items-center gap-2" data-value="indian">
<span class="material-symbols-outlined text-[20px]">restaurant</span>
<span class="font-title-md text-title-md">Indian food</span>
</button>
<button class="preference-chip chip-unselected px-4 py-3 rounded-full border-2 transition-all duration-200 flex items-center gap-2" data-value="highprotein">
<span class="material-symbols-outlined text-[20px]">fitness_center</span>
<span class="font-title-md text-title-md">High-protein</span>
</button>
<button class="preference-chip chip-unselected px-4 py-3 rounded-full border-2 transition-all duration-200 flex items-center gap-2" data-value="lowcalorie">
<span class="material-symbols-outlined text-[20px]">scale</span>
<span class="font-title-md text-title-md">Low-calorie</span>
</button>
<button class="preference-chip chip-unselected px-4 py-3 rounded-full border-2 transition-all duration-200 flex items-center gap-2" data-value="restaurant">
<span class="material-symbols-outlined text-[20px]">storefront</span>
<span class="font-title-md text-title-md">Restaurant meals</span>
</button>
</div>
<!-- Filler image to add visual interest related to Kinetic Harvest -->
<div class="mt-auto mb-stack-lg rounded-xl overflow-hidden shadow-sm h-48 w-full relative" data-alt="A vibrant, modern flat-lay composition of fresh ingredients like bright green spinach, rich orange lentils, and a sleek piece of salmon on a warm, light-colored background. The lighting is soft and natural, emphasizing a healthy, energetic 'Kinetic Harvest' aesthetic. The colors are vivid but cohesive, creating a welcoming and appetizing mood suitable for a high-end nutrition app." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAYOwKxJzseGoAG3Hu0DlkAEMQj9Vby6fmvjeHloFvw870b5lycv0h472AStXpTh7TGPvUbHIX-FopKm_eJvIOJae0EgLw-6tkelNlWZ9JX0GUnIv97Q7tQiM8sQhtpNZ_qS4o5HWwdZEY6QeoXiLmpkQ6Lfk0su5PGDVu3G1pfDEqbl8oGxHvCNsOlhoOh1mS9GNR1-nvDxsww5-ynQHvBMHHqgN0oM5CpCXOd26laJ8nMf-FI3fnXtpeL2_hIKmTj06OaeK68pkqU')">
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-80"></div>
</div>
<!-- Sticky Bottom Action -->
<div class="mt-auto w-full pt-4">
<button class="w-full bg-coach-orange text-paper-white font-title-md text-title-md py-4 rounded-xl shadow-[0_8px_20px_rgba(242,107,56,0.3)] hover:opacity-90 active:scale-[0.98] transition-all duration-200">
                Continue
            </button>
</div>
</main>
<script>
        // Simple interaction for chips
        document.addEventListener('DOMContentLoaded', () => {
            const chips = document.querySelectorAll('.preference-chip');
            chips.forEach(chip => {
                chip.addEventListener('click', () => {
                    if (chip.classList.contains('chip-unselected')) {
                        chip.classList.remove('chip-unselected');
                        chip.classList.add('chip-selected');
                    } else {
                        chip.classList.remove('chip-selected');
                        chip.classList.add('chip-unselected');
                    }
                });
            });
        });
    </script>
</body></html>
