<style>
        body {

        .pulse-shadow {
            box-shadow: 0 0 0 0 rgba(242, 107, 56, 0.4);

        }

        @keyframes pulse {
            0% {
                transform: scale(0.98);
                box-shadow: 0 0 0 0 rgba(242, 107, 56, 0.4);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 15px rgba(242, 107, 56, 0);

            100% {

<div class="text-center mb-10 max-w-md mx-auto">

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const getStartedBtn = document.querySelector('button');
            
            // Add a subtle tactile feel on touch devices
            getStartedBtn.addEventListener('touchstart', () => {
                getStartedBtn.style.transform = 'scale(0.96)';
            });
            
            getStartedBtn.addEventListener('touchend', () => {
                getStartedBtn.style.transform = 'scale(1)';
            });
        });
    </script>
