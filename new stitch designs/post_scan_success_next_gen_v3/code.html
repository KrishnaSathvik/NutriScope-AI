<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Lightweight Confetti Implementation
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const confettiCount = 80;
            const confettiArr = [];
            // Use theme colors for confetti
            const colors = ['#812700', '#a93702', '#99f895', '#ffb59c'];

            class Confetti {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = (Math.random() * canvas.height) - canvas.height;
                    this.w = Math.random() * 8 + 4;
                    this.h = Math.random() * 12 + 6;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.vy = Math.random() * 3 + 2;
                    this.vx = Math.random() * 2 - 1;
                    this.rotation = Math.random() * 360;
                    this.rotationSpeed = Math.random() * 10 - 5;
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
                    ctx.rotate(this.rotation * Math.PI / 180);
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
                    ctx.restore();
                }
                update() {
                    this.y += this.vy;
                    this.x += this.vx;
                    this.rotation += this.rotationSpeed;
                    if (this.y > canvas.height) {
                        this.y = -20;
                        this.x = Math.random() * canvas.width;
                    }
                    this.draw();
                }
            }

            for (let i = 0; i < confettiCount; i++) {
                confettiArr.push(new Confetti());
            }

            let animationId;
            let frames = 0;
            const maxFrames = 300; // Stop confetti after a few seconds

            function renderConfetti() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confettiArr.forEach(c => c.update());
                frames++;
                
                if(frames < maxFrames) {
                    animationId = requestAnimationFrame(renderConfetti);
                } else {
                    // Fade out canvas
                    canvas.style.transition = 'opacity 1s ease';
                    canvas.style.opacity = '0';
                    setTimeout(() => cancelAnimationFrame(animationId), 1000);
                }
            }

            renderConfetti();

            // Handle Resize
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        });
    </script>
