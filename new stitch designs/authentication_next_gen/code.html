<!-- Main Container -->
<main class="relative z-10 min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Auth Card Container -->
<div class="w-full max-w-[440px] relative">
<!-- Brand Element -->
<div class="text-center mb-8">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight md:font-display-lg md:text-display-lg">Nutriscope AI</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-2">Precision nutrition, elevated.</p>
</div>
<!-- Glassmorphic Auth Card -->
<div class="bg-glass-bg backdrop-blur-[20px] border border-glass-border rounded-[2rem] p-8 shadow-lg transition-transform duration-300 hover:scale-[1.01]">
<!-- Toggle Container -->
<div class="flex bg-surface-variant/50 rounded-full p-1 mb-8">
<button class="flex-1 py-2 rounded-full font-label-bold text-label-bold bg-white text-primary shadow-sm transition-all" id="btn-login">Log In</button>
<button class="flex-1 py-2 rounded-full font-label-bold text-label-bold text-on-surface-variant hover:text-primary transition-all" id="btn-signup">Sign Up</button>
</div>
<!-- Form Area -->
<form class="space-y-6" id="auth-form">
<div class="space-y-4">
<!-- Email Input -->
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-white/80 border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl font-body-md text-body-md text-on-surface transition-all placeholder:text-on-surface-variant/50 outline-none shadow-sm backdrop-blur-sm" placeholder="Email address" type="email"/>
</div>
<!-- Password Input -->
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-white/80 border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl font-body-md text-body-md text-on-surface transition-all placeholder:text-on-surface-variant/50 outline-none shadow-sm backdrop-blur-sm" placeholder="Password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="font-caption text-caption text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<!-- Primary CTA -->
<button class="w-full py-4 bg-primary text-on-primary rounded-xl font-label-bold text-label-bold flex items-center justify-center gap-2 shadow-[0_8px_16px_rgba(169,55,2,0.2)] hover:bg-primary-container hover:shadow-[0_12px_24px_rgba(169,55,2,0.3)] transition-all active:scale-[0.98]" type="submit">

<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>

<div class="flex items-center gap-4 my-8">
<div class="flex-1 h-px bg-outline-variant/50"></div>
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-wider">Or continue with</span>

<script>
        // Simple UI toggle logic for demonstration
        const btnLogin = document.getElementById('btn-login');
        const btnSignup = document.getElementById('btn-signup');
        
        btnSignup.addEventListener('click', () => {
            btnSignup.classList.add('bg-white', 'text-primary', 'shadow-sm');
            btnSignup.classList.remove('text-on-surface-variant');
            btnLogin.classList.remove('bg-white', 'text-primary', 'shadow-sm');
            btnLogin.classList.add('text-on-surface-variant');
        });

        btnLogin.addEventListener('click', () => {
            btnLogin.classList.add('bg-white', 'text-primary', 'shadow-sm');
            btnLogin.classList.remove('text-on-surface-variant');
            btnSignup.classList.remove('bg-white', 'text-primary', 'shadow-sm');
            btnSignup.classList.add('text-on-surface-variant');
        });
    </script>
