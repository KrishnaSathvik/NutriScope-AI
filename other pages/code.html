<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Microphone Permission - NutriScope AI</title>

                        "on-tertiary-fixed": "#1a1b1f",
                        "surface-variant": "#e4e2dd",

                        "paper-white": "#FFFFFF",
                        "on-error-container": "#93000a",

                        "surface-bright": "#fbf9f4",

                        "tertiary-fixed-dim": "#c6c6cb",

                        "surface": "#fbf9f4",
                        "tertiary-fixed": "#e3e2e7",
                        "on-primary-container": "#561700",
                        "ink-black": "#1C1C1E",
                        "coach-orange": "#F26B38",
                        "surface-container-low": "#f5f3ee",
                        "on-primary-fixed": "#380c00",
                        "on-tertiary-fixed-variant": "#46464b",

                        "title-md": ["20px", { "lineHeight": "25px", "fontWeight": "600" }]

                }
            }
        }

<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Subtle pulsing animation for the microphone icon container to suggest voice activity */
        @keyframes subtle-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        
        .mic-pulse-ring {
            animation: subtle-pulse 3s infinite ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center antialiased overflow-hidden selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Modal Container simulating an iOS permission sheet -->
<main class="w-full max-w-md px-margin-main relative z-10 flex flex-col items-center justify-center min-h-[884px]">
<div class="bg-surface-container-lowest w-full rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] overflow-hidden flex flex-col items-center pt-10 pb-8 px-6 relative transform transition-all duration-300 ease-out hover:shadow-[0_12px_40px_rgb(0,0,0,0.1)]">
<!-- Ambient Glow Behind Icon -->
<div class="absolute top-12 left-1/2 -translate-x-1/2 w-32 h-32 bg-coach-orange/10 rounded-full blur-2xl z-0 pointer-events-none"></div>
<!-- Icon Graphic -->
<div class="relative z-10 w-24 h-24 mb-stack-lg flex items-center justify-center">
<!-- Decorative outer rings -->
<div class="absolute inset-0 bg-primary-fixed-dim/20 rounded-full mic-pulse-ring"></div>
<div class="absolute inset-2 bg-primary-fixed-dim/40 rounded-full" style="animation: subtle-pulse 3s infinite ease-in-out 0.5s;"></div>
<!-- Center icon circle -->
<div class="w-16 h-16 bg-surface-container-lowest rounded-full flex items-center justify-center shadow-sm relative z-20 border border-outline-variant/30">
<span class="material-symbols-outlined text-coach-orange" style="font-size: 32px; font-variation-settings: 'FILL' 1;">
                        mic
                    </span>
</div>
</div>
<!-- Typography Content -->
<div class="text-center space-y-stack-sm mb-8 z-10">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">
                    Enable Voice Logging
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto">
                    Log your meals hands-free with AI-powered voice recognition. Just describe what you're eating and we'll handle the macros.
                </p>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-stack-sm mt-auto z-10">
<button class="w-full bg-coach-orange text-paper-white h-14 rounded-xl font-title-md text-title-md flex items-center justify-center transition-transform active:scale-[0.98] shadow-[0_4px_14px_0_rgba(242,107,56,0.2)] hover:bg-surface-tint" type="button">
                    Allow Microphone Access
                </button>
<button class="w-full bg-transparent text-tertiary h-14 rounded-xl font-title-md text-title-md flex items-center justify-center transition-colors hover:bg-surface-container-low active:bg-surface-container-high" type="button">
                    Maybe Later
                </button>
</div>
<!-- Subtle instructional text -->
<p class="mt-4 font-body-sm text-body-sm text-tertiary-container text-center">
                 You can change this anytime in Settings.
             </p>
</div>
</main>
<script>
        // Simple interaction to mimic closing the prompt
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const modal = document.querySelector('div.bg-surface-container-lowest');
                // Animate out
                modal.style.transform = 'translateY(20px) scale(0.95)';
                modal.style.opacity = '0';
                setTimeout(() => {
                    // Log to console for demo purposes instead of actually navigating
                    console.log(`Action taken: ${e.target.innerText.trim()}`);
                    // Reset for demo loop
                    setTimeout(() => {
                        modal.style.transform = 'translateY(0) scale(1)';
                        modal.style.opacity = '1';
                    }, 500);
                }, 300);
            });
        });
    </script>
</body></html>
