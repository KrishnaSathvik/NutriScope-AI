<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high border-2 border-transparent">
<img alt="User profile photo" class="w-full h-full object-cover" data-alt="A close-up, soft-focus portrait of an athletic user with a warm, encouraging smile. The lighting is natural and bright, conveying a sense of health and vitality, fitting a modern wellness app avatar." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBhvN9pH4S6KKChn8V8VJw5uyYQeiqPusoYAT7M4cgVVrDGKecDnfu8MF7Gq2VfzVweX0KL3c8j5YTqA5C3AQ9vJSR1g4EztApj-Hnd4ZZavwmh6afiZ4o7l41Jhyw8kpBnG_gTO1Wr_1ddxQVSUGKBk_VHeEboQGDIM_OrR-V0EEQoGgCouhuZz05snsXYb4ZIHh6CtBhOME4ZiHG3uV_UOZU5UYRMMcKOWNbyn30Bhv2XvkdmlqJISQbuEEETLvYSm8yZWv7MHem2"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-primary">NutriScope AI</h1>
<button aria-label="Notifications" class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:opacity-80 transition-opacity rounded-full">
<span class="material-symbols-outlined text-2xl">notifications</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-main pb-32">
<div class="max-w-md w-full flex flex-col items-center text-center animate-fade-in-up">
<!-- Empty State Icon -->
<div class="relative w-48 h-48 mb-8 flex items-center justify-center">
<!-- Subtle background glow -->
<div class="absolute inset-0 bg-primary-fixed opacity-30 rounded-full blur-3xl"></div>
<div class="relative z-10 w-32 h-32 bg-surface-container-lowest rounded-full shadow-[0_8px_30px_rgb(242,107,56,0.12)] flex items-center justify-center">
<span class="material-symbols-outlined text-[64px] text-surface-tint opacity-80" style="font-variation-settings: 'FILL' 0, 'wght' 300;">shopping_basket</span>
</div>
</div>
<!-- Typography -->
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-stack-sm">Your list is empty</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-stack-lg max-w-xs mx-auto">
                Add high-protein meals from your plan to generate a smart grocery list.
            </p>
<!-- Primary Action -->
<button class="bg-coach-orange text-paper-white font-title-md text-title-md px-8 py-4 rounded-xl shadow-[0_4px_15px_rgba(242,107,56,0.25)] hover:bg-surface-tint hover:scale-[1.02] active:scale-95 transition-all duration-200 w-full sm:w-auto min-w-[200px]">
                Browse Meal Plans
            </button>
</div>
</main>
<!-- BottomNavBar -->

<span class="material-symbols-outlined mb-1">calendar_today</span>
<span class="font-label-caps text-label-caps">Today</span>
</a>
<!-- Meals Tab -->

<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
<span class="font-label-caps text-label-caps">Meals</span>
</a>

<span class="font-label-caps text-label-caps">Scan</span>
</a>
<!-- Coach Tab -->

<span class="font-label-caps text-label-caps">Coach</span>

<style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
<script>
        // Simple top bar scroll shadow effect
        const header = document.querySelector('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 10) {
                header.classList.add('shadow-sm');
                header.classList.replace('bg-background', 'bg-surface-container-lowest');
            } else {
                header.classList.remove('shadow-sm');
                header.classList.replace('bg-surface-container-lowest', 'bg-background');
            }
        });
    </script>
