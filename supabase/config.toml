# Nutriscope AI iOS — dedicated Supabase project
# NOT shared with the nutriscope web app (nutriscope.app).
# Create a new project at https://supabase.com for iOS only.

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "com.nutriscopeai.app://auth-callback"
additional_redirect_urls = ["com.nutriscopeai.app://auth-callback"]
jwt_expiry = 3600
# Required for guest-first flow: BackendAuthBootstrap signs in anonymously before scans.
enable_anonymous_sign_ins = true

[auth.external.apple]
enabled = true
client_id = "com.nutriscopeai.app"

[functions.analyze-meal]
verify_jwt = true
