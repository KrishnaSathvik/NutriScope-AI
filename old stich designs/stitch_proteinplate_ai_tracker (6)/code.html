<style>
        /* Ambient Glow Effect for the central illustration */
        .ambient-glow {
            box-shadow: 0 0 60px 20px rgba(242, 107, 56, 0.15);
        }
        
        /* Subtle pulse for the scanner line */
        @keyframes scan-pulse {
            0% { opacity: 0.3; transform: translateY(-50%) scaleX(0.8); }
            50% { opacity: 0.8; transform: translateY(-50%) scaleX(1); }
            100% { opacity: 0.3; transform: translateY(-50%) scaleX(0.8); }
        }
        .scanner-line {
            animation: scan-pulse 3s infinite ease-in-out;
        }

        /* Float animation for the illustration */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center font-body-lg overflow-hidden">
<!-- Content Container -->
<main class="w-full max-w-md px-margin-main flex flex-col items-center justify-between min-h-[751px] relative z-10">
<!-- Top spacer to push content down slightly on tall screens -->
<div class="h-8 md:h-12 w-full shrink-0"></div>
<!-- Central Illustration Area -->
<div class="flex-1 flex flex-col items-center justify-center w-full max-w-[280px] mx-auto relative animate-float mb-stack-lg">
<!-- Glow Base -->
<div class="absolute inset-0 bg-coach-orange/10 rounded-full blur-3xl ambient-glow z-0"></div>
<!-- Graphic Container (Glassmorphism circle) -->
<div class="w-64 h-64 rounded-full bg-paper-white/60 backdrop-blur-md border border-surface-container-high shadow-[0_8px_32px_rgba(242,107,56,0.1)] flex items-center justify-center relative z-10">
<!-- Camera/Scanner Icon Composite -->
<div class="relative w-32 h-32 text-coach-orange">
<!-- Main Icon -->
<span class="material-symbols-outlined text-[128px] leading-none absolute inset-0" style="font-variation-settings: 'FILL' 0, 'wght' 200;">
                        center_focus_strong
                    </span>
<!-- Inner Food Icon -->
<div class="absolute inset-0 flex items-center justify-center bg-transparent">
<span class="material-symbols-outlined text-[64px] text-protein-teal" style="font-variation-settings: 'FILL' 1;">
                            lunch_dining
                        </span>
</div>
<!-- Decorative Scanner Line -->
<div class="absolute top-1/2 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-coach-orange to-transparent scanner-line"></div>
</div>
<!-- Floating Accent Chips -->
<div class="absolute -top-4 -right-4 bg-protein-teal/10 border border-protein-teal/20 rounded-full px-3 py-1.5 shadow-sm transform rotate-6">
<span class="font-label-caps text-label-caps text-protein-teal">INSTANT LOG</span>
</div>
<div class="absolute -bottom-6 -left-2 bg-coach-orange/10 border border-coach-orange/20 rounded-full px-3 py-1.5 shadow-sm transform -rotate-3">
<span class="font-label-caps text-label-caps text-coach-orange">AI COACHING</span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="w-full text-center flex flex-col gap-stack-md mb-stack-lg shrink-0">
<h1 class="font-headline-xl text-headline-xl text-ink-black px-4">
                Enable Camera for AI Scanning
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mx-auto">
                Scan your meals in seconds to track protein and get instant coaching. We never store photos without your permission.
            </p>
</div>

<div class="w-full flex flex-col gap-stack-sm pb-8 shrink-0">

<button class="w-full bg-coach-orange text-paper-white h-16 rounded-xl font-title-md text-title-md shadow-[0_4px_14px_0_rgba(242,107,56,0.39)] hover:shadow-[0_6px_20px_rgba(242,107,56,0.23)] hover:bg-primary-container active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">
                    camera_alt
                </span>
                Allow Camera Access
            </button>
<!-- Secondary/Ghost Button -->
<button class="w-full bg-transparent text-warm-sun h-14 rounded-xl font-title-md text-title-md hover:bg-surface-container-low active:bg-surface-container transition-colors duration-200">

<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-surface-container-low rounded-full mix-blend-multiply filter blur-3xl opacity-70 pointer-events-none z-0"></div>
