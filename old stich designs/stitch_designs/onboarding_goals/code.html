<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>NutriScope AI - Goals</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&amp;family=Work+Sans:wght@400;500;600&amp;family=Geist:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#a83900",
                        "surface-container-highest": "#e4e2e4",
                        "primary-container": "#f06a33",
                        "inverse-surface": "#303032",
                        "on-secondary-container": "#316e52",
                        "on-error-container": "#93000a",
                        "primary-fixed-dim": "#ffb59a",
                        "tertiary": "#7c5800",
                        "surface-tint": "#a83900",
                        "inverse-primary": "#ffb59a",
                        "surface-container-low": "#f6f3f5",
                        "on-background": "#1b1b1d",
                        "outline": "#8c7168",
                        "on-primary-fixed-variant": "#812900",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#95d4b3",
                        "secondary-container": "#aeeecb",
                        "on-secondary-fixed-variant": "#0e5138",
                        "on-tertiary-fixed": "#271900",
                        "tertiary-fixed": "#ffdea8",
                        "surface-dim": "#dcd9dc",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#eae7ea",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#5e4200",
                        "on-surface": "#1b1b1d",
                        "on-primary-fixed": "#380d00",
                        "surface": "#fcf8fb",
                        "surface-bright": "#fcf8fb",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#f3f0f2",
                        "outline-variant": "#e0c0b5",
                        "background": "#fcf8fb",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#e4e2e4",
                        "on-tertiary-container": "#3b2800",
                        "on-surface-variant": "#584239",
                        "secondary": "#2c694e",
                        "tertiary-fixed-dim": "#ffba20",
                        "secondary-fixed": "#b1f0ce",
                        "error": "#ba1a1a",
                        "primary-fixed": "#ffdbcf",
                        "on-secondary-fixed": "#002114",
                        "on-primary-container": "#531800",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#bf8900",
                        "surface-container": "#f0edef"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem",
                        "3xl": "1.5rem"
                    },
                    "spacing": {
                        "lg": "24px",
                        "xl": "32px",
                        "xs": "4px",
                        "container-margin": "20px",
                        "md": "16px",
                        "sm": "8px",
                        "stack-gap": "12px",
                        "base": "4px",
                        "safe": "env(safe-area-inset-bottom, 20px)"
                    },
                    "fontFamily": {
                        "body-lg": ["Work Sans", "sans-serif"],
                        "headline-lg-mobile": ["Plus Jakarta Sans", "sans-serif"],
                        "label-sm": ["Geist", "sans-serif"],
                        "headline-lg": ["Plus Jakarta Sans", "sans-serif"],
                        "title-md": ["Plus Jakarta Sans", "sans-serif"],
                        "display-lg": ["Plus Jakarta Sans", "sans-serif"],
                        "mono-data": ["Geist", "monospace"],
                        "body-md": ["Work Sans", "sans-serif"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "700"}],
                        "label-sm": ["13px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "38px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "title-md": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "mono-data": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        .glass-platter {
            background-color: #F2F2F7;
            border: 0.5px solid rgba(0,0,0,0.05);
        }
        
        /* Goal Selection Interactions */
        .goal-card {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .goal-card:active {
            transform: scale(0.98);
        }
        .goal-card.selected {
            background-color: theme('colors.primary-container');
            border-color: theme('colors.primary');
            color: theme('colors.on-primary');
        }
        .goal-card.selected .material-symbols-outlined {
            color: theme('colors.on-primary');
        }
        .goal-card.selected .subtext {
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* Liquid Progress Bar Animation */
        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 40%; }
        }
        .progress-fill {
            animation: fillProgress 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col no-scrollbar">
<!-- Progress Indicator (iOS 17 Style) -->
<div class="w-full px-container-margin pt-12 pb-4 z-10 bg-background/80 backdrop-blur-xl sticky top-0">
<div class="flex items-center justify-between mb-sm">
<button aria-label="Go Back" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-variant transition-colors active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 600;">arrow_back</span>
</button>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Step 2 of 5</span>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full progress-fill"></div>
</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow px-container-margin pt-6 pb-32 flex flex-col gap-xl max-w-2xl mx-auto w-full">
<!-- Header Section -->
<header class="flex flex-col gap-sm">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background">
                What is your goal?
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                We'll tailor your daily targets based on your choice.
            </p>
</header>
<!-- Goals List -->
<div class="flex flex-col gap-stack-gap" id="goal-list">
<!-- Goal Card: Lose fat -->
<button aria-pressed="false" class="goal-card glass-platter rounded-2xl p-md flex items-center justify-between w-full text-left focus:outline-none focus:ring-2 focus:ring-primary/50 group" onclick="selectGoal(this)">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-xl bg-surface flex items-center justify-center shadow-sm group-[.selected]:bg-white/20">
<span class="material-symbols-outlined text-tertiary group-[.selected]:text-on-primary text-2xl" style="font-variation-settings: 'wght' 500;">trending_down</span>
</div>
<div class="flex flex-col">
<span class="font-title-md text-title-md text-on-background group-[.selected]:text-on-primary">Lose fat</span>
<span class="subtext font-body-md text-body-md text-on-surface-variant text-sm mt-0.5">Focus on caloric deficit &amp; high protein.</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-[.selected]:text-on-primary" style="font-variation-settings: 'wght' 300;">radio_button_unchecked</span>
</button>
<!-- Goal Card: Build muscle -->
<button aria-pressed="false" class="goal-card glass-platter rounded-2xl p-md flex items-center justify-between w-full text-left focus:outline-none focus:ring-2 focus:ring-primary/50 group" onclick="selectGoal(this)">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-xl bg-surface flex items-center justify-center shadow-sm group-[.selected]:bg-white/20">
<span class="material-symbols-outlined text-secondary group-[.selected]:text-on-primary text-2xl" style="font-variation-settings: 'wght' 500;">fitness_center</span>
</div>
<div class="flex flex-col">
<span class="font-title-md text-title-md text-on-background group-[.selected]:text-on-primary">Build muscle</span>
<span class="subtext font-body-md text-body-md text-on-surface-variant text-sm mt-0.5">Surplus calories &amp; maximum protein.</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-[.selected]:text-on-primary" style="font-variation-settings: 'wght' 300;">radio_button_unchecked</span>
</button>
<!-- Goal Card: Maintain -->
<button aria-pressed="false" class="goal-card glass-platter rounded-2xl p-md flex items-center justify-between w-full text-left focus:outline-none focus:ring-2 focus:ring-primary/50 group" onclick="selectGoal(this)">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-xl bg-surface flex items-center justify-center shadow-sm group-[.selected]:bg-white/20">
<span class="material-symbols-outlined text-on-surface-variant group-[.selected]:text-on-primary text-2xl" style="font-variation-settings: 'wght' 500;">sync_alt</span>
</div>
<div class="flex flex-col">
<span class="font-title-md text-title-md text-on-background group-[.selected]:text-on-primary">Maintain</span>
<span class="subtext font-body-md text-body-md text-on-surface-variant text-sm mt-0.5">Keep current weight, optimize macros.</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-[.selected]:text-on-primary" style="font-variation-settings: 'wght' 300;">radio_button_unchecked</span>
</button>
<!-- Goal Card: Eat more protein -->
<button aria-pressed="false" class="goal-card glass-platter rounded-2xl p-md flex items-center justify-between w-full text-left focus:outline-none focus:ring-2 focus:ring-primary/50 group" onclick="selectGoal(this)">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-xl bg-surface flex items-center justify-center shadow-sm group-[.selected]:bg-white/20">
<span class="material-symbols-outlined text-primary group-[.selected]:text-on-primary text-2xl" style="font-variation-settings: 'wght' 500;">local_dining</span>
</div>
<div class="flex flex-col">
<span class="font-title-md text-title-md text-on-background group-[.selected]:text-on-primary">Eat more protein</span>
<span class="subtext font-body-md text-body-md text-on-surface-variant text-sm mt-0.5">Just track protein, ignore the rest.</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-[.selected]:text-on-primary" style="font-variation-settings: 'wght' 300;">radio_button_unchecked</span>
</button>
<!-- Goal Card: Just understand my meals -->
<button aria-pressed="false" class="goal-card glass-platter rounded-2xl p-md flex items-center justify-between w-full text-left focus:outline-none focus:ring-2 focus:ring-primary/50 group" onclick="selectGoal(this)">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-xl bg-surface flex items-center justify-center shadow-sm group-[.selected]:bg-white/20">
<span class="material-symbols-outlined text-on-surface-variant group-[.selected]:text-on-primary text-2xl" style="font-variation-settings: 'wght' 500;">insights</span>
</div>
<div class="flex flex-col">
<span class="font-title-md text-title-md text-on-background group-[.selected]:text-on-primary">Just understand my meals</span>
<span class="subtext font-body-md text-body-md text-on-surface-variant text-sm mt-0.5">No strict targets, just visibility.</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-[.selected]:text-on-primary" style="font-variation-settings: 'wght' 300;">radio_button_unchecked</span>
</button>
</div>
</main>
<!-- Fixed Bottom Action Area (Suppressed global nav for transactional screen) -->
<div class="fixed bottom-0 left-0 w-full p-container-margin pb-safe bg-background/90 backdrop-blur-2xl border-t border-outline-variant/20 z-50">
<div class="max-w-2xl mx-auto">
<button aria-disabled="true" class="w-full h-14 rounded-xl bg-surface-container-highest text-on-surface-variant font-title-md text-title-md flex items-center justify-center transition-all duration-300 pointer-events-none opacity-50" id="continue-btn">
                Continue
            </button>
</div>
</div>
<script>
        function selectGoal(selectedButton) {
            // Get all goal cards
            const cards = document.querySelectorAll('.goal-card');
            
            // Remove selected class and reset icon for all
            cards.forEach(card => {
                card.classList.remove('selected');
                card.setAttribute('aria-pressed', 'false');
                const icon = card.querySelector('.material-symbols-outlined:last-child');
                icon.textContent = 'radio_button_unchecked';
                icon.style.fontVariationSettings = "'wght' 300, 'FILL' 0";
            });

            // Add selected class to clicked button
            selectedButton.classList.add('selected');
            selectedButton.setAttribute('aria-pressed', 'true');
            
            // Change radio icon to checked state
            const selectedIcon = selectedButton.querySelector('.material-symbols-outlined:last-child');
            selectedIcon.textContent = 'check_circle';
            selectedIcon.style.fontVariationSettings = "'wght' 500, 'FILL' 1";

            // Enable Continue Button
            const continueBtn = document.getElementById('continue-btn');
            continueBtn.classList.remove('bg-surface-container-highest', 'text-on-surface-variant', 'pointer-events-none', 'opacity-50');
            continueBtn.classList.add('bg-primary', 'text-on-primary', 'shadow-lg', 'shadow-primary/20', 'hover:opacity-90', 'active:scale-95');
            continueBtn.setAttribute('aria-disabled', 'false');
        }
    </script>
</body></html>
