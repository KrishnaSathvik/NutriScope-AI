<div class="flex flex-col gap-stack-md">
<div class="flex flex-col">
<label class="font-title-md text-title-md text-on-surface mb-2" for="name">Name</label>
<input class="bg-surface-container border-none rounded-xl px-4 py-4 font-body-lg text-body-lg focus:ring-2 focus:ring-coach-orange/50 transition-all text-on-surface placeholder-on-surface-variant/50" id="name" placeholder="How should we call you?" type="text"/>
</div>
<div class="flex flex-col">
<label class="font-title-md text-title-md text-on-surface mb-2" for="age">Age</label>
<input class="bg-surface-container border-none rounded-xl px-4 py-4 font-body-lg text-body-lg focus:ring-2 focus:ring-coach-orange/50 transition-all text-on-surface placeholder-on-surface-variant/50" id="age" placeholder="Years" type="number"/>
</div>
<div class="grid grid-cols-2 gap-stack-md">
<div class="flex flex-col">

<span class="absolute right-4 top-1/2 -translate-y-1/2 font-body-sm text-body-sm text-on-surface-variant">cm</span>
</div>
</div>
<div class="flex flex-col">

<span class="absolute right-4 top-1/2 -translate-y-1/2 font-body-sm text-body-sm text-on-surface-variant">kg</span>
</div>
</div>
</div>
</div>
