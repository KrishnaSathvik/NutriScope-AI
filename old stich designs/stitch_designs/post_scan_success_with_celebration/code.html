<script>
        // Advanced canvas confetti effect for success screen
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.createElement('canvas');
            canvas.id = 'confetti-canvas';
            canvas.className = 'fixed inset-0 pointer-events-none z-50';
            document.body.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            // Kinetic Harvest palette + some accent colors
            const colors = ['#f26b38', '#fbf9f4', '#dbdad5', '#2D6A4F', '#FFD54F', '#a93702'];
            const particles = [];

            class Particle {
                constructor() {
                    // Burst from top center
                    this.x = width / 2;
                    this.y = height * 0.2;
                    
                    // Random spread
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = Math.random() * 15 + 5;
                    this.vx = Math.cos(angle) * velocity;
                    this.vy = Math.sin(angle) * velocity - 10; // Extra upward boost
                    
                    this.size = Math.random() * 8 + 6;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.rotation = Math.random() * 360;
                    this.rs = (Math.random() - 0.5) * 10; // Rotation speed
                    this.shape = Math.random() > 0.5 ? 'circle' : 'rect';
                    
                    // Wobble effect
                    this.wobble = Math.random() * Math.PI * 2;
                    this.wobbleSpeed = Math.random() * 0.1 + 0.05;
                }

                update() {
                    this.x += this.vx + Math.sin(this.wobble) * 2; // Add side-to-side drift
                    this.y += this.vy;
                    this.vy += 0.3; // Gravity
                    
                    // Add some air resistance
                    this.vx *= 0.99;
                    
                    this.rotation += this.rs;
                    this.wobble += this.wobbleSpeed;
                }

                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation * Math.PI / 180);
                    ctx.fillStyle = this.color;
                    
                    // Add subtle shadow for depth
                    ctx.shadowColor = 'rgba(0,0,0,0.1)';
                    ctx.shadowBlur = 2;
                    ctx.shadowOffsetY = 1;
                    
                    if (this.shape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        // Sometimes draw slightly stretched rects
                        const stretch = Math.sin(this.wobble) * 0.5 + 1;
                        ctx.fillRect(-this.size / 2, -this.size * stretch / 2, this.size, this.size * stretch);
                    }
                    ctx.restore();
                }
            }

            // Create particles
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }

            // Animation loop
            function animate() {
                ctx.clearRect(0, 0, width, height);
                let active = false;
                
                particles.forEach(p => {
                    p.update();
                    p.draw();
                    if (p.y < height + p.size) {
                        active = true;
                    }
                });
                
                if (active) {
                    requestAnimationFrame(animate);
                } else {
                    // Cleanup canvas when particles are gone
                    canvas.remove();
                }
            }

            animate();

            // Handle resize
            window.addEventListener('resize', () => {
                if (document.body.contains(canvas)) {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;
                }
            });
        });
    </script>
