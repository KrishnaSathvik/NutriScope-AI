<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center p-margin-mobile antialiased">
<!-- Top App Bar (Suppressed via semantic rule: Transactional screen) -->
<main class="w-full max-w-md w-full mx-auto flex flex-col gap-lg">
<!-- Header Section -->
<header class="flex flex-col items-center text-center gap-base">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-xs shadow-sm">
<span class="material-symbols-outlined text-on-primary-container" data-icon="energy_savings_leaf" style="font-size: 32px; font-variation-settings: 'FILL' 1;">energy_savings_leaf</span>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your protein data and coaching.</p>
</header>
<!-- Form Section -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant p-md ambient-shadow transition-all duration-300">
<form action="#" class="flex flex-col gap-md" method="POST">
<div class="input-group flex flex-col gap-xs relative">
<label class="font-label-bold text-label-bold text-on-surface-variant transition-colors duration-200" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface rounded-lg border border-surface-container-highest focus:border-primary focus:border-2 focus:ring-0 outline-none font-body-md text-body-md text-on-surface transition-all duration-200 placeholder-outline-variant" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<div class="input-group flex flex-col gap-xs relative">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface-variant transition-colors duration-200" for="password">Password</label>
<a class="font-caption text-caption text-primary hover:text-primary-container transition-colors duration-200" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface rounded-lg border border-surface-container-highest focus:border-primary focus:border-2 focus:ring-0 outline-none font-body-md text-body-md text-on-surface transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors duration-200" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-label-bold text-label-bold py-sm rounded-lg hover:bg-primary-container active:scale-[0.98] transition-all duration-200 mt-sm flex justify-center items-center gap-xs" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-lg flex flex-col gap-md">
<div class="flex items-center gap-sm">
<div class="flex-1 h-px bg-surface-container-highest"></div>
<span class="font-caption text-caption text-on-surface-variant uppercase tracking-wider">Or continue with</span>
<div class="flex-1 h-px bg-surface-container-highest"></div>
</div>
<div class="flex justify-center gap-md">
<!-- Social Login using the provided image asset -->
<button class="w-16 h-16 rounded-full border border-surface-container-highest flex items-center justify-center hover:bg-surface-container-low transition-colors duration-200 bg-surface-container-lowest overflow-hidden p-2">

<span class="material-symbols-outlined text-on-surface" data-icon="apple" style="font-size: 24px;">apps</span>
